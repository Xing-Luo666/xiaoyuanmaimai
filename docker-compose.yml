version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: school-trade-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-114514}
      MYSQL_DATABASE: ${DB_NAME:-school_trade}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: school-trade-app
    restart: always
    ports:
      - "${PORT:-28080}:28080"
    environment:
      PORT: "28080"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-114514}
      DB_NAME: ${DB_NAME:-school_trade}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: