<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>统一身份认证管理系统</title>
  <link rel="icon" href="/favicon.ico">
  <style>
    html, body, #app { height: 100%; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Microsoft YaHei', sans-serif; }
    /* 初始加载动画 */
    .app-loading { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f7fa; }
    .app-loading .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: #409eff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-loading"><div class="spinner"></div></div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
