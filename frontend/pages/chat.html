<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.chat-wrap { max-width:700px; margin:0 auto; height:calc(100vh - 90px); display:flex; flex-direction:column }
.chat-inner-header { padding:12px 16px; background:#fff; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:12px; flex-shrink:0 }
.chat-inner-header .back-btn { font-size:20px; color:#374151; text-decoration:none; cursor:pointer; padding:4px; line-height:1 }
.chat-inner-header .back-btn:hover { color:#2563eb }
.chat-msgs { flex:1; overflow-y:auto; padding:16px; background:#f9fafb; display:flex; flex-direction:column; gap:8px }
.chat-msgs .loading-more { text-align:center; padding:12px; color:#9ca3af; font-size:12px; display:none }
.chat-msg { max-width:75%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5; word-break:break-word; position:relative }
.chat-msg.mine { align-self:flex-end; background:#2563eb; color:#fff; border-bottom-right-radius:4px }
.chat-msg.other { align-self:flex-start; background:#fff; border:1px solid #e5e7eb; border-bottom-left-radius:4px }
.chat-msg .sender { font-size:11px; color:#6b7280; margin-bottom:4px }
.chat-msg.mine .sender { color:#93c5fd }
.chat-msg .time { font-size:11px; opacity:0.7; margin-top:4px }
.chat-msg .actions { display:none; position:absolute; top:-8px }
.chat-msg.mine .actions { right:8px }
.chat-msg.other .actions { left:8px }
.chat-msg:hover .actions { display:flex; gap:4px }
/* 系统消息卡片 */
.sys-msg { align-self:center; max-width:85%; width:100%; background:linear-gradient(135deg,#f0f9ff,#fef3c7); border:1px solid #fde68a; border-radius:12px; padding:14px; font-size:13px; cursor:pointer; transition:all .2s }
.sys-msg:hover { box-shadow:0 2px 12px rgba(251,191,36,.15); transform:translateY(-1px) }
.sys-msg .sys-row { display:flex; gap:10px; align-items:center }
.sys-msg .sys-icon { font-size:28px; flex-shrink:0 }
.sys-msg .sys-info { flex:1; min-width:0 }
.sys-msg .sys-title { font-weight:600; font-size:14px; color:#1f2937 }
.sys-msg .sys-detail { color:#6b7280; margin-top:2px; font-size:12px }
.sys-msg .sys-time { color:#9ca3af; font-size:11px; margin-top:6px; text-align:right }
.sys-msg img { width:40px; height:40px; border-radius:6px; object-fit:cover; flex-shrink:0 }
.chat-msg .actions button { font-size:10px; padding:2px 6px; border:none; border-radius:4px; cursor:pointer; background:rgba(0,0,0,.5); color:#fff }
.chat-input { padding:12px 16px; background:#fff; border-top:1px solid #e5e7eb; display:flex; gap:8px; flex-shrink:0 }
.chat-input input { flex:1; padding:10px 14px; border:1px solid #e5e7eb; border-radius:24px; font-size:14px; outline:none }
.chat-input button { padding:8px 20px; border:none; border-radius:24px; background:#2563eb; color:#fff; cursor:pointer; font-size:14px }
.chat-input .img-btn { width:40px; padding:8px; border-radius:50%; background:#f3f4f6; color:#374151; font-size:18px; display:flex; align-items:center; justify-content:center }
.drag-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(37,99,235,.15); z-index:998; align-items:center; justify-content:center; pointer-events:none }
.drag-overlay.show { display:flex }
.drag-overlay-inner { background:#fff; border:3px dashed #2563eb; border-radius:16px; padding:40px 60px; text-align:center; box-shadow:0 8px 32px rgba(37,99,235,.25) }
.drag-overlay-inner .icon { font-size:48px; margin-bottom:12px }
.drag-overlay-inner .text { font-size:18px; color:#2563eb; font-weight:600 }
</style>
</head>
<body>
<div id="siteHeaderPlaceholder"></div>
<div class="chat-wrap">
  <div class="chat-inner-header">
    <div style="flex:1"><b id="chatTitle" style="font-size:16px">聊天</b><div style="font-size:11px;color:#6b7280" id="orderInfo"></div></div>
  </div>
  <div class="chat-msgs" id="chatMsgs">
    <div class="loading-more" id="loadingMore">加载更多消息...</div>
  </div>
  <div class="chat-input">
    <span class="img-btn" onclick="document.getElementById('imgInput').click()" title="发送图片">🖼</span>
    <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files);this.value=''">
    <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">发送</button>
  </div>
</div>

<!-- 图片查看器 -->
<div class="img-viewer-overlay" id="imgViewer">
  <div class="img-viewer-toolbar">
    <button onclick="viewOriginal()">查看原图</button>
    <button onclick="saveImage()">另存为</button>
    <button onclick="closeViewer()">✕ 关闭</button>
  </div>
  <div class="img-viewer-container" id="imgViewerContainer">
    <img id="imgViewerImg" src="" alt="">
  </div>
  <div class="img-viewer-zoom">
    <button onclick="zoomImage(-25)" title="缩小">−</button>
    <span class="zoom-val" id="zoomVal">100%</span>
    <button onclick="zoomImage(25)" title="放大">+</button>
    <button onclick="zoomImage(-999)" title="重置">↺</button>
  </div>
</div>

<div class="drag-overlay" id="dragOverlay"><div class="drag-overlay-inner"><div class="icon">📷</div><div class="text">释放以发送图片</div><div style="color:#6b7280;font-size:13px;margin-top:6px">支持 jpg/png/gif/webp，单张 ≤10MB</div></div></div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
var userId, ws, peerKey, peerName;
var messages = [];      // 当前显示的消息列表
var hasMore = false;    // 是否还有更多历史消息
var isLoadingMore = false;
var viewerZoom = 100;   // 图片查看器缩放百分比
var viewerSrc = '';     // 当前查看的图片URL

(function() {
  api.verifyAndInit().then(function(ok) {
    if (!ok) { location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
    var user = api.getUser();
    userId = user.userId;
    SiteHeader.render();

    var params = new URLSearchParams(location.search);
    var orderId = params.get('orderId');
    peerKey = params.get('peer_key');
    peerName = params.get('peer_name') || '聊天';

    if (!orderId && !peerKey) { showToast('缺少参数', 'error'); return; }

    // 根据来源设置页面标题
    var from = params.get('from');
    var productId = params.get('id');

    document.getElementById('chatTitle').textContent = peerName;
    document.getElementById('orderInfo').textContent = peerKey ? '' : '订单号: ' + orderId;

    loadHistory().then(function() {
      connectWS();
    });
  });
})();

// 加载聊天历史（分页）
async function loadHistory(before) {
  if (!peerKey) return;
  var url = '/chat/peer/history?peer_key=' + encodeURIComponent(peerKey);
  if (before) url += '&before=' + encodeURIComponent(before);
  var res = await api.get(url);
  if (res.code !== 200) return;

  var data = res.data;
  var newMsgs = (data.messages || data || []);
  hasMore = data.hasMore || false;

  if (newMsgs.length === 0) return;

  // 后端返回的是倒序（最新在前），需要反转并检查去重
  newMsgs = newMsgs.reverse();
  // 如果已有消息，将新消息插入到前面；否则直接赋值
  if (messages.length > 0) {
    // 去重并插入前面
    var existingIds = {};
    messages.forEach(function(m) { existingIds[m.id] = true; });
    var uniqueNew = newMsgs.filter(function(m) { return !existingIds[m.id]; });
    messages = uniqueNew.concat(messages);
  } else {
    messages = newMsgs;
  }
  renderMessages();
}

// 滚动到顶部时加载更多
var msgsContainer = document.getElementById('chatMsgs');
msgsContainer.addEventListener('scroll', function() {
  if (msgsContainer.scrollTop <= 30 && hasMore && !isLoadingMore) {
    isLoadingMore = true;
    document.getElementById('loadingMore').style.display = 'block';
    // 获取最早消息的时间作为 before 参数
    var oldest = messages[0];
    var before = oldest ? oldest.createdAt : null;
    loadHistory(before).then(function() {
      isLoadingMore = false;
      document.getElementById('loadingMore').style.display = 'none';
    });
  }
});

function connectWS() {
  var token = api.token;
  var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var wsURL;
  if (peerKey) {
    wsURL = protocol + '//' + location.host + '/api/chat/ws/peer?peer_key=' + encodeURIComponent(peerKey) + '&token=' + encodeURIComponent(token);
  } else {
    var orderId = new URLSearchParams(location.search).get('orderId');
    wsURL = protocol + '//' + location.host + '/api/chat/ws/' + orderId + '?token=' + encodeURIComponent(token);
  }
  ws = new WebSocket(wsURL);
  ws.onopen = function() { console.log('WebSocket connected'); };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'deleted') {
      messages = messages.filter(function(m){ return m.id !== msg.messageId; });
    } else if (msg.type === 'recall' || msg.recalled) {
      var m = messages.find(function(x){ return x.id === (msg.messageId || msg.id); });
      if (m) { m.content = '[消息已撤回]'; m.recalled = true; m.type = 'text'; m.msgType = 'text'; }
    } else {
      var existing = messages.find(function(x){ return x.id === msg.id; });
      if (!existing) { messages.push(msg); }
    }
    renderMessages();
  };
  ws.onclose = function() { console.log('WebSocket closed'); };
  ws.onerror = function(e) { console.log('WebSocket error', e); };

  // 拖拽上传
  var dragOverlay = document.getElementById('dragOverlay');
  var dragCounter = 0;
  document.addEventListener('dragenter', function(e) {
    e.preventDefault(); dragCounter++;
    if (dragCounter === 1) dragOverlay.classList.add('show');
  });
  document.addEventListener('dragleave', function(e) {
    e.preventDefault(); dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('show'); }
  });
  document.addEventListener('dragover', function(e) { e.preventDefault(); });
  document.addEventListener('drop', function(e) {
    e.preventDefault(); dragCounter = 0; dragOverlay.classList.remove('show');
    handleFiles(e.dataTransfer.files);
  });
}

function handleFiles(files) {
  if (!files || !files.length) return;
  var validExts = ['jpg','jpeg','png','gif','webp','bmp'];
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (!f.type.startsWith('image/')) continue;
    var ext = f.name.split('.').pop().toLowerCase();
    if (validExts.indexOf(ext) === -1) { showToast(f.name + ' 格式不支持', 'error'); continue; }
    sendImage(f);
  }
}

function renderMessages() {
  var container = document.getElementById('chatMsgs');
  var wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

  container.innerHTML = '<div class="loading-more" id="loadingMore"' + (hasMore ? '' : ' style="display:none"') + '>加载更多消息...</div>' +
    messages.map(function(m) {
      var contentType = m.msgType || m.type;

      // 系统消息渲染为特殊卡片
      if (contentType === 'system') {
        return renderSystemMsg(m);
      }

      var isMine = m.senderId === userId;
      var content;
      if (contentType === 'image') {
        var src = m.content || '';
        content = '<img class="chat-img-thumb" src="'+escAttr(src)+'" data-full="'+escAttr(src)+'" ondblclick="openViewer(this)" alt="图片" title="双击查看大图" loading="lazy">';
      } else {
        content = escHtml(m.content||'');
      }
      var actions = '';
      if (isMine && !m.recalled) {
        actions = '<div class="actions"><button onclick="recallMsg(\''+m.id+'\')">撤回</button><button onclick="deleteMsg(\''+m.id+'\')">删除</button></div>';
      }
      return '<div class="chat-msg '+(isMine?'mine':'other')+'">' +
        '<div class="sender">'+(isMine?'我':escHtml(m.senderName||''))+'</div>' +
        content +
        '<div class="time">'+formatDate(m.createdAt)+'</div>' +
        actions + '</div>';
    }).join('');

  if (wasAtBottom) {
    container.scrollTop = container.scrollHeight;
  }
}

function renderSystemMsg(m) {
  try {
    var d = JSON.parse(m.content || '{}');
  } catch(e) { return ''; }
  var actionMap = {
    bought:    { icon: '🛒', verb: '购买了', color: '#2563eb' },
    accepted:  { icon: '✅', verb: '接受了订单', color: '#16a34a' },
    rejected:  { icon: '❌', verb: '拒绝了订单', color: '#ef4444' },
    shipped:   { icon: '📦', verb: '已发货', color: '#d97706' },
    completed: { icon: '🎉', verb: '已确认收货', color: '#16a34a' },
    cancelled: { icon: '↩️', verb: '取消了订单', color: '#6b7280' }
  };
  var info = actionMap[d.action] || { icon: '📋', verb: '更新了订单', color: '#6b7280' };
  var name = escHtml(d.text || '');
  var title = escHtml(d.productTitle || '');
  var spec = d.specName ? ' · ' + escHtml(d.specName) : '';
  var qty = d.quantity ? ' x' + d.quantity : '';
  var price = d.price ? '¥' + Number(d.price).toFixed(2) : '';
  var img = d.productImage || '';

  return '<div class="sys-msg" onclick="location.href=\'orders.html\'">' +
    '<div class="sys-row">' +
    '<span class="sys-icon">' + info.icon + '</span>' +
    (img ? '<img src="' + escAttr(img) + '" onerror="this.style.display=\'none\'">' : '') +
    '<div class="sys-info">' +
    '<div class="sys-title" style="color:' + info.color + '">' + name + ' ' + info.verb + '</div>' +
    '<div class="sys-detail">' + title + spec + qty + '</div>' +
    (price ? '<div class="sys-detail" style="color:#ef4444;font-weight:600">' + price + '</div>' : '') +
    '</div></div>' +
    '<div class="sys-time">' + formatDate(m.createdAt) + ' · 点击查看订单</div>' +
    '</div>';
}

// ===== 图片查看器 =====
function openViewer(el) {
  viewerSrc = el.getAttribute('data-full') || el.src;
  viewerZoom = 100;
  var img = document.getElementById('imgViewerImg');
  img.src = viewerSrc;
  img.style.transform = 'scale(1)';
  document.getElementById('zoomVal').textContent = '100%';
  document.getElementById('imgViewer').classList.add('show');
}

function closeViewer() {
  document.getElementById('imgViewer').classList.remove('show');
  viewerSrc = '';
}

function zoomImage(delta) {
  if (delta === -999) { viewerZoom = 100; } // 重置
  else { viewerZoom += delta; }
  viewerZoom = Math.max(25, Math.min(400, viewerZoom));
  var scale = viewerZoom / 100;
  document.getElementById('imgViewerImg').style.transform = 'scale(' + scale + ')';
  document.getElementById('zoomVal').textContent = viewerZoom + '%';
}

function viewOriginal() {
  if (viewerSrc) window.open(viewerSrc, '_blank');
}

function saveImage() {
  if (viewerSrc) {
    var a = document.createElement('a');
    a.href = viewerSrc;
    a.download = viewerSrc.split('/').pop().split('?')[0] || 'image';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }
}

// 鼠标滚轮缩放
document.getElementById('imgViewerContainer').addEventListener('wheel', function(e) {
  e.preventDefault();
  zoomImage(e.deltaY < 0 ? 10 : -10);
});

// 点击背景关闭查看器
document.getElementById('imgViewer').addEventListener('click', function(e) {
  if (e.target === this) closeViewer();
});

// ESC 关闭
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeViewer();
});

// ===== 发送 / 操作 =====
function sendText() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || !ws) return;
  ws.send(JSON.stringify({ type: 'text', content: text }));
  input.value = '';
}

function sendImage(file) {
  if (!file || !ws) return;
  if (file.size > 10*1024*1024) { showToast('图片不能超过10MB', 'error'); return; }
  // 先上传图片到服务器，拿到URL后再通过WebSocket发送
  var formData = new FormData();
  formData.append('image', file);
  fetch('/api/upload/chat-image', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + api.token },
    body: formData
  }).then(function(r) { return r.json(); })
  .then(function(res) {
    if (res.code === 200 && res.data && res.data.url) {
      ws.send(JSON.stringify({ type: 'image', content: res.data.url }));
    } else {
      showToast(res.message || '图片上传失败', 'error');
    }
  }).catch(function() {
    showToast('图片上传失败，请重试', 'error');
  });
}

function recallMsg(msgId) { if (ws) ws.send(JSON.stringify({ type: 'recall', messageId: msgId })); }
function deleteMsg(msgId) { if (ws) ws.send(JSON.stringify({ type: 'delete', messageId: msgId })); }

function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escAttr(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>
</body>
</html>
