<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.chat-wrap { max-width:700px; margin:0 auto; height:100vh; display:flex; flex-direction:column }
.chat-header { padding:12px 16px; background:#fff; border-bottom:1px solid #e5e7eb; display:flex; align-items:center; gap:12px; flex-shrink:0 }
.chat-msgs { flex:1; overflow-y:auto; padding:16px; background:#f9fafb; display:flex; flex-direction:column; gap:8px }
.chat-msg { max-width:75%; padding:10px 14px; border-radius:12px; font-size:14px; line-height:1.5; word-break:break-word; position:relative }
.chat-msg.mine { align-self:flex-end; background:#2563eb; color:#fff; border-bottom-right-radius:4px }
.chat-msg.other { align-self:flex-start; background:#fff; border:1px solid #e5e7eb; border-bottom-left-radius:4px }
.chat-msg .sender { font-size:11px; color:#6b7280; margin-bottom:4px }
.chat-msg.mine .sender { color:#93c5fd }
.chat-msg img { max-width:200px; border-radius:8px; cursor:pointer }
.chat-msg .time { font-size:11px; opacity:0.7; margin-top:4px }
.chat-msg .actions { display:none; position:absolute; top:-8px }
.chat-msg.mine .actions { right:8px }
.chat-msg.other .actions { left:8px }
.chat-msg:hover .actions { display:flex; gap:4px }
.chat-msg .actions button { font-size:10px; padding:2px 6px; border:none; border-radius:4px; cursor:pointer; background:rgba(0,0,0,.5); color:#fff }
.chat-input { padding:12px 16px; background:#fff; border-top:1px solid #e5e7eb; display:flex; gap:8px; flex-shrink:0 }
.chat-input input { flex:1; padding:10px 14px; border:1px solid #e5e7eb; border-radius:24px; font-size:14px; outline:none }
.chat-input button { padding:8px 20px; border:none; border-radius:24px; background:#2563eb; color:#fff; cursor:pointer; font-size:14px }
.chat-input .img-btn { width:40px; padding:8px; border-radius:50%; background:#f3f4f6; color:#374151; font-size:18px; display:flex; align-items:center; justify-content:center }
.modal-img { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.9); z-index:999; align-items:center; justify-content:center }
.modal-img.show { display:flex }
.modal-img img { max-width:90vw; max-height:90vh }
.drag-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(37,99,235,.15); z-index:998; align-items:center; justify-content:center; pointer-events:none }
.drag-overlay.show { display:flex }
.drag-overlay-inner { background:#fff; border:3px dashed #2563eb; border-radius:16px; padding:40px 60px; text-align:center; box-shadow:0 8px 32px rgba(37,99,235,.25) }
.drag-overlay-inner .icon { font-size:48px; margin-bottom:12px }
.drag-overlay-inner .text { font-size:18px; color:#2563eb; font-weight:600 }
</style>
</head>
<body>
<div class="top-nav"><div class="top-nav-inner"><span>欢迎来到校园二手交易平台！</span><div id="topNavRight"><a href="login.html">请登录</a><a href="register.html">免费注册</a></div></div></div>
<header class="main-header" style="box-shadow:none;border-bottom:1px solid #e5e7eb"><div class="header-inner"><div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer"><div class="logo-icon">📚</div><div><div class="logo-text">校园二手</div><div class="logo-sub">闲置交易平台</div></div></div><a href="javascript:history.back()" style="font-size:22px;color:#1f2937;text-decoration:none;margin-left:auto">← 返回</a></div></header>
<div class="chat-wrap">
  <div class="chat-header">
    <a href="orders.html" style="font-size:18px;text-decoration:none">←</a>
    <div><b id="chatTitle">聊天</b><div style="font-size:11px;color:#6b7280" id="orderInfo"></div></div>
  </div>
  <div class="chat-msgs" id="chatMsgs"></div>
  <div class="chat-input">
    <span class="img-btn" onclick="document.getElementById('imgInput').click()" title="发送图片">🖼</span>
    <input type="file" id="imgInput" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files);this.value=''">
    <input type="text" id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendText()">
    <button onclick="sendText()">发送</button>
  </div>
</div>
<div class="modal-img" id="imgModal" onclick="this.classList.remove('show')"><img id="imgModalSrc"></div>
<div class="drag-overlay" id="dragOverlay"><div class="drag-overlay-inner"><div class="icon">📷</div><div class="text">释放以发送图片</div><div style="color:#6b7280;font-size:13px;margin-top:6px">支持 jpg/png/gif/webp，单张 ≤10MB</div></div></div>

<script src="../js/api.js"></script>
<script>
var orderId, userId, ws, peerKey, peerName;
var messages = [];

(async function() {
  if (!await api.verifyAndInit()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  var user = api.getUser();
  userId = user.userId;
  updateNav();

  var params = new URLSearchParams(location.search);
  orderId = params.get('orderId');
  peerKey = params.get('peer_key');
  peerName = params.get('peer_name') || '聊天';

  if (!orderId && !peerKey) { alert('缺少参数'); return; }

  // 加载历史
  var res;
  if (peerKey) {
    res = await api.getChatHistoryPeer(peerKey);
  } else {
    res = await api.getChatHistory(orderId);
  }
  if (res.code === 200) {
    messages = res.data || [];
    renderMessages();
  }

  // 设置标题
  document.getElementById('chatTitle').textContent = peerKey ? peerName : '订单聊天';
  document.getElementById('orderInfo').textContent = peerKey ? '' : '订单号: ' + orderId;

  // 连接 WebSocket
  var token = api.token;
  var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var wsURL;
  if (peerKey) {
    wsURL = protocol + '//' + location.host + '/api/chat/ws/peer?peer_key=' + encodeURIComponent(peerKey) + '&token=' + encodeURIComponent(token);
  } else {
    wsURL = protocol + '//' + location.host + '/api/chat/ws/' + orderId + '?token=' + encodeURIComponent(token);
  }
  ws = new WebSocket(wsURL);
  ws.onopen = function() { console.log('WebSocket connected'); };
  ws.onmessage = function(e) {
    var msg = JSON.parse(e.data);
    if (msg.type === 'deleted') {
      messages = messages.filter(function(m){ return m.id !== msg.messageId; });
    } else if (msg.type === 'recall') {
      var m = messages.find(function(x){ return x.id === msg.messageId; });
      if (m) { m.content = '[消息已撤回]'; m.recalled = true; }
    } else if (msg.recalled) {
      var m = messages.find(function(x){ return x.id === msg.id; });
      if (m) { m.content = '[消息已撤回]'; m.recalled = true; }
    } else {
      var existing = messages.find(function(x){ return x.id === msg.id; });
      if (!existing) { messages.push(msg); }
    }
    renderMessages();
  };
  ws.onclose = function() { console.log('WebSocket closed'); };
  ws.onerror = function(e) { console.log('WebSocket error', e); };

  // ===== 拖拽上传 =====
  var dragOverlay = document.getElementById('dragOverlay');
  var dragCounter = 0;
  document.addEventListener('dragenter', function(e) {
    e.preventDefault();
    dragCounter++;
    if (dragCounter === 1) { dragOverlay.classList.add('show'); }
  });
  document.addEventListener('dragleave', function(e) {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove('show'); }
  });
  document.addEventListener('dragover', function(e) { e.preventDefault(); });
  document.addEventListener('drop', function(e) {
    e.preventDefault();
    dragCounter = 0;
    dragOverlay.classList.remove('show');
    handleFiles(e.dataTransfer.files);
  });
})();

function handleFiles(files) {
  if (!files || !files.length) return;
  var validExts = ['jpg','jpeg','png','gif','webp','bmp'];
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    if (!f.type.startsWith('image/')) continue;
    var ext = f.name.split('.').pop().toLowerCase();
    if (validExts.indexOf(ext) === -1) { showToast(f.name + ' 格式不支持', 'error'); continue; }
    sendImage(f);
  }
}

function renderMessages() {
  var container = document.getElementById('chatMsgs');
  container.innerHTML = messages.map(function(m) {
    var isMine = m.senderId === userId;
    var contentType = m.msgType || m.type;
    var content;
    if (contentType === 'image') {
      content = '<img src="'+escAttr(m.content)+'" data-full="'+escAttr(m.content)+'" ondblclick="showImage(this)" alt="图片">';
    } else {
      content = escHtml(m.content||'');
    }
    var actions = '';
    if (isMine && !m.recalled) {
      actions = '<div class="actions"><button onclick="recallMsg(\''+m.id+'\')">撤回</button><button onclick="deleteMsg(\''+m.id+'\')">删除</button></div>';
    }
    return '<div class="chat-msg '+(isMine?'mine':'other')+'">' +
      '<div class="sender">'+(isMine?'我':escHtml(m.senderName||''))+'</div>' +
      content +
      '<div class="time">'+formatDate(m.createdAt)+'</div>' +
      actions + '</div>';
  }).join('');
  container.scrollTop = container.scrollHeight;
}

function sendText() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || !ws) return;
  ws.send(JSON.stringify({ type: 'text', content: text }));
  input.value = '';
}

function sendImage(file) {
  if (!file || !ws) return;
  if (file.size > 10*1024*1024) { showToast('图片不能超过10MB', 'error'); return; }
  var reader = new FileReader();
  reader.onload = function() {
    ws.send(JSON.stringify({ type: 'image', content: reader.result }));
  };
  reader.readAsDataURL(file);
}

function recallMsg(msgId) {
  if (!ws) return;
  ws.send(JSON.stringify({ type: 'recall', messageId: msgId }));
}

function deleteMsg(msgId) {
  if (!ws) return;
  ws.send(JSON.stringify({ type: 'delete', messageId: msgId }));
}

function showImage(el) {
  var src = el.getAttribute('data-full') || el.src;
  document.getElementById('imgModalSrc').src = src;
  document.getElementById('imgModal').classList.add('show');
}

function updateNav() {
  var user = api.getUser();
  if (!user) return;
  document.getElementById('topNavRight').innerHTML =
    '<span>Hi, <b>' + escHtml(user.username) + '</b></span>' +
    '<a href="../index.html">首页</a>' +
    '<a href="orders.html">我的订单</a>' +
    '<a href="profile.html">个人中心</a>' +
    '<a href="javascript:void(0)" onclick="api.logout()">退出</a>';
}
function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
function escAttr(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }
</script>
</body>
</html>
