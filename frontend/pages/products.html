<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品广场 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
</head>
<body>

<div id="siteHeaderPlaceholder"></div>

<div class="products-wrap">
  <aside class="filter-sidebar" id="filterSidebar">
    <h4>筛选条件</h4>
    <div class="filter-group"><div class="group-name">分类</div><div class="filter-options" id="catFilters"></div></div>
    <div class="filter-group"><div class="group-name">校区</div><div class="filter-options" id="campusFilters"></div></div>
    <div class="filter-group"><div class="group-name">成色</div><div class="filter-options" id="condFilters"></div></div>
    <div class="filter-group"><div class="group-name">价格区间</div><div class="filter-price-input"><input type="number" id="priceMin" placeholder="最低价" min="0"><span>-</span><input type="number" id="priceMax" placeholder="最高价" min="0"></div></div>
    <div class="filter-group"><div class="group-name">其他</div><div class="filter-options"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:#374151"><input type="checkbox" id="hasImageFilter" onchange="applyFilters()" style="cursor:pointer"> 仅看有图商品</label></div></div>
    <button class="mall-btn mall-btn-primary mall-btn-block" onclick="applyFilters()">确定筛选</button>
    <button class="mall-btn mall-btn-outline mall-btn-block" style="margin-top:8px" onclick="resetAll()">重置条件</button>
  </aside>

  <section class="products-main">
    <div class="sort-row">
      <div class="sort-tabs">
        <div class="sort-tab active" data-sort="newest" onclick="setSort('newest',this)">最新</div>
        <div class="sort-tab" data-sort="popular" onclick="setSort('popular',this)">最热</div>
        <div class="sort-tab" data-sort="rating_desc" onclick="setSort('rating_desc',this)">评分高</div>
        <div class="sort-tab" data-sort="sold_desc" onclick="setSort('sold_desc',this)">销量高</div>
        <div class="sort-tab" data-sort="price_asc" onclick="setSort('price_asc',this)">价格↑</div>
        <div class="sort-tab" data-sort="price_desc" onclick="setSort('price_desc',this)">价格↓</div>
      </div>
      <div class="sort-count" id="resultCount">共 0 件商品</div>
    </div>
    <div class="product-grid" id="productListGrid"></div>
  </section>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
var CONDITIONS = [
  { value: 'all', label: '全部' },
  { value: 'new', label: '全新' },
  { value: 'like_new', label: '几乎全新' },
  { value: 'good', label: '成色不错' },
  { value: 'fair', label: '有使用痕迹' }
];

var currentFilters = { category: 'all', campus: 'all', condition: 'all', hasImage: false, priceMin: '', priceMax: '', keyword: '', sortBy: 'newest' };

(function init() {
  var params = new URLSearchParams(location.search);
  if (params.get('category')) currentFilters.category = params.get('category');
  if (params.get('keyword')) { currentFilters.keyword = params.get('keyword'); var s = document.getElementById('listSearch'); if (s) s.value = params.get('keyword'); }
  if (params.get('sort')) currentFilters.sortBy = params.get('sort');
  if (params.get('sortBy')) currentFilters.sortBy = params.get('sortBy');
  if (params.get('campus')) currentFilters.campus = params.get('campus');
  if (params.get('condition')) currentFilters.condition = params.get('condition');
  if (params.get('hasImage') === '1') currentFilters.hasImage = true;
  if (params.get('priceMin')) currentFilters.priceMin = params.get('priceMin');
  if (params.get('priceMax')) currentFilters.priceMax = params.get('priceMax');
  renderFilterOptions();
  highlightCatNav();
  highlightSortTab();
  loadProducts();
  SiteHeader.render();
})();

function renderFilterOptions() {
  document.getElementById('catFilters').innerHTML = [{value:'all',label:'全部'}].concat(CATEGORIES).map(function(c) {
    return '<span class="filter-opt' + (currentFilters.category === c.value ? ' active' : '') + '" onclick="currentFilters.category=\'' + c.value + '\';renderFilterOptions();applyFilters()">' + c.label + '</span>';
  }).join('');
  document.getElementById('campusFilters').innerHTML = [{value:'all',label:'全部校区'}].concat(CAMPUSES).map(function(c) {
    return '<span class="filter-opt' + (currentFilters.campus === c.value ? ' active' : '') + '" onclick="currentFilters.campus=\'' + c.value + '\';renderFilterOptions();applyFilters()">' + c.label + '</span>';
  }).join('');
  document.getElementById('condFilters').innerHTML = CONDITIONS.map(function(c) {
    return '<span class="filter-opt' + (currentFilters.condition === c.value ? ' active' : '') + '" onclick="currentFilters.condition=\'' + c.value + '\';renderFilterOptions();applyFilters()">' + c.label + '</span>';
  }).join('');
  var imgChk = document.getElementById('hasImageFilter');
  if (imgChk) imgChk.checked = !!currentFilters.hasImage;
  var pmin = document.getElementById('priceMin'); if (pmin) pmin.value = currentFilters.priceMin || '';
  var pmax = document.getElementById('priceMax'); if (pmax) pmax.value = currentFilters.priceMax || '';
}

function setCategory(cat) {
  currentFilters.category = cat;
  highlightCatNav();
  applyFilters();
}
function setSort(sort, el) {
  currentFilters.sortBy = sort;
  document.querySelectorAll('.sort-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  applyFilters();
}

function highlightCatNav() {
  var cats = ['all', 'electronics', 'books', 'furniture', 'sports', 'entertainment', 'clothing', 'beauty'];
  document.querySelectorAll('.cat-nav-item').forEach(function(item, i) {
    item.classList.toggle('active', cats[i] === currentFilters.category);
  });
}
function highlightSortTab() {
  document.querySelectorAll('.sort-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.sort === currentFilters.sortBy); });
}
function applyFilters() {
  // 同步搜索框值
  var searchEl = document.getElementById('listSearch');
  if (searchEl) currentFilters.keyword = searchEl.value.trim();
  // 同步价格/有图输入框
  var pmin = document.getElementById('priceMin'); if (pmin) currentFilters.priceMin = pmin.value.trim();
  var pmax = document.getElementById('priceMax'); if (pmax) currentFilters.priceMax = pmax.value.trim();
  var imgChk = document.getElementById('hasImageFilter'); if (imgChk) currentFilters.hasImage = imgChk.checked;

  // 更新侧边栏筛选器选中状态
  renderFilterOptions();

  // 更新 URL
  var params = new URLSearchParams();
  if (currentFilters.category !== 'all') params.set('category', currentFilters.category);
  if (currentFilters.keyword) params.set('keyword', currentFilters.keyword);
  if (currentFilters.sortBy !== 'newest') params.set('sort', currentFilters.sortBy);
  if (currentFilters.campus !== 'all') params.set('campus', currentFilters.campus);
  if (currentFilters.condition !== 'all') params.set('condition', currentFilters.condition);
  if (currentFilters.hasImage) params.set('hasImage', '1');
  if (currentFilters.priceMin) params.set('priceMin', currentFilters.priceMin);
  if (currentFilters.priceMax) params.set('priceMax', currentFilters.priceMax);
  var newUrl = location.pathname + (params.toString() ? '?' + params.toString() : '');
  history.pushState(null, '', newUrl);

  loadProducts();
}

function resetAll() {
  currentFilters = { category: 'all', campus: 'all', condition: 'all', hasImage: false, priceMin: '', priceMax: '', keyword: '', sortBy: 'newest' };
  var s = document.getElementById('listSearch'); if (s) s.value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.querySelectorAll('.cat-nav-item').forEach(function(i, idx) { i.classList.toggle('active', idx === 0); });
  document.querySelectorAll('.sort-tab').forEach(function(i, idx) { i.classList.toggle('active', idx === 0); });
  applyFilters();
}

function loadProducts() {
  var query = { status: 'selling', sortBy: currentFilters.sortBy };
  if (currentFilters.keyword) query.keyword = currentFilters.keyword;
  if (currentFilters.category !== 'all') query.category = currentFilters.category;
  if (currentFilters.campus !== 'all') query.campus = currentFilters.campus;
  if (currentFilters.condition !== 'all') query.condition = currentFilters.condition;
  if (currentFilters.hasImage) query.hasImage = '1';
  if (currentFilters.priceMin) query.priceMin = currentFilters.priceMin;
  if (currentFilters.priceMax) query.priceMax = currentFilters.priceMax;
  api.get('/products', query).then(function(res) {
    var grid = document.getElementById('productListGrid');
    if (res.code !== 200 || !res.data.list || !res.data.list.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">📭</div><p>没有找到相关商品</p></div>';
      document.getElementById('resultCount').textContent = '共 0 件商品';
      return;
    }
    var filtered = res.data.list;
    document.getElementById('resultCount').textContent = '共 ' + filtered.length + ' 件商品';
    grid.innerHTML = filtered.map(function(p) { return renderProductCard(p); }).join('');
  }).catch(function() {});
}

function renderProductCard(p) {
  var img = p.images && p.images.length ? p.images[0] : 'https://picsum.photos/seed/p' + p.id + '/300/300';
  var tags = '';
  if ((Date.now() - new Date(p.createdAt).getTime()) < 86400000 * 3) tags += '<span class="product-tag">NEW</span>';
  var rating = (typeof p.ratingAvg === 'number') ? p.ratingAvg : 5;
  var sold = p.sold30d || 0;
  return '<div class="product-card" onclick="location.href=\'product-detail.html?id=' + p.id + '\'"><div class="product-img"><img src="' + img + '" alt="' + escHtml(p.title) + '" loading="lazy" onerror="this.src=\'https://picsum.photos/seed/fb' + p.id + '/300/300\'">' + tags + '</div><div class="product-info"><div class="product-name">' + escHtml(p.title) + '</div><div class="product-price-row"><span class="product-price"><span class="product-price-symbol">¥</span>' + p.price + '</span>' + (p.oriPrice > p.price ? '<span class="product-ori-price">¥' + p.oriPrice + '</span>' : '') + '</div><div class="product-meta"><span>' + getCategoryLabel(p.category) + '</span><span>' + getCampusLabel(p.campus) + '</span><span>⭐ ' + rating.toFixed(1) + '</span><span>月售 ' + sold + '</span></div></div></div>';
}

function escHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
</script>
</body>
</html>
