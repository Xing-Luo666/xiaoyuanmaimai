<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.addr-modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center }
.addr-modal { background:#fff; border-radius:12px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; padding:24px }
.addr-modal h3 { margin:0 0 16px 0; font-size:18px }
.addr-option { display:flex; align-items:center; padding:12px; border:1px solid #e5e7eb; border-radius:8px; cursor:pointer; margin-bottom:8px; transition:all .2s }
.addr-option:hover { border-color:#2563eb }
.addr-option.selected { border-color:#2563eb; background:#eff6ff }
.addr-option input[type=radio] { margin-right:12px }
.addr-option .addr-info { flex:1 }
.addr-option .addr-info .addr-name { font-weight:600; font-size:14px }
.addr-option .addr-info .addr-detail { font-size:12px; color:#6b7280; margin-top:2px }
.addr-quick-form { background:#f9fafb; border-radius:8px; padding:16px; margin-top:12px }
.addr-quick-form .form-row { display:flex; gap:8px; margin-bottom:8px }
.addr-quick-form .form-row input { flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px }
.addr-modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end }
</style>
</head>
<body>
<div id="siteHeaderPlaceholder"></div>

<div class="profile-wrap">
  <aside class="profile-sidebar">
    <div class="profile-header" id="sidebarProfile"></div>
    <div class="profile-menu">
      <div class="profile-menu-item active" data-tab="myProducts" onclick="switchTab('myProducts',this)">📦 我的商品</div>
      <div class="profile-menu-item" data-tab="myOrders" onclick="switchTab('myOrders',this)">📋 购买记录</div>
      <div class="profile-menu-item" data-tab="sellOrders" onclick="switchTab('sellOrders',this)">💰 卖出记录</div>
      <div class="profile-menu-item" data-tab="myReviews" onclick="switchTab('myReviews',this)">⭐ 我的评价</div>
      <div class="profile-menu-item" data-tab="cart" onclick="switchTab('cart',this)">🛒 购物车</div>
      <div class="profile-menu-item" data-tab="favorites" onclick="switchTab('favorites',this)">♥ 我的收藏</div>
      <div class="profile-menu-item" data-tab="history" onclick="switchTab('history',this)">🕐 浏览历史</div>
      <div class="profile-menu-item" data-tab="addresses" onclick="switchTab('addresses',this)">📍 收货地址</div>
      <div class="profile-menu-item" data-tab="settings" onclick="switchTab('settings',this)">⚙️ 账号设置</div>
      <div class="profile-menu-item" data-tab="changePwd" onclick="switchTab('changePwd',this)">🔒 修改密码</div>
    </div>
  </aside>
  <section class="profile-content" id="profileContent"></section>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
var currentUser = null;

(function() {
  api.verifyAndInit().then(function(ok) {
    if (!ok) { location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
    SiteHeader.render();
    api.get('/user/me').then(function(res) {
      if (res.code !== 200) { api.logout(); return; }
      currentUser = res.data;
      renderSidebarProfile();
      switchTab('myProducts', document.querySelector('.profile-menu-item[data-tab=myProducts]'));
    });
  });
})();

function renderSidebarProfile() {
  // 使用统一工具：默认头像时显示带首字母的动态 SVG
  var avatarUrl = api.resolveAvatarUrl(currentUser.avatar, currentUser.username);
  var fallbackUrl = api.generateDefaultAvatar(currentUser.username).replace(/'/g, '%27');
  var avatarHTML = '<img src="' + escHtml(avatarUrl) + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.src=\'' + fallbackUrl + '\'">';
  document.getElementById('sidebarProfile').innerHTML =
    '<div class="profile-avatar">' + avatarHTML + '</div>' +
    '<div class="profile-name">' + escHtml(currentUser.nickname || currentUser.username) + '</div>' +
    '<div class="profile-role">' + (currentUser.role === 'admin' ? '管理员' : '在校学生') + '</div>';
}

function switchTab(tab, el) {
  document.querySelectorAll('.profile-menu-item').forEach(function(i) { i.classList.remove('active'); });
  el.classList.add('active');
  var ct = document.getElementById('profileContent');
  if (tab === 'myProducts') { ct.innerHTML = '<h4 style="margin-bottom:14px">📦 我的商品</h4><div id="myProdList"></div>'; loadMyProducts(); }
  else if (tab === 'myOrders') { ct.innerHTML = '<h4 style="margin-bottom:14px">📋 购买记录</h4><div id="buyOrderList"></div>'; loadOrders('buyer', 'buyOrderList'); }
  else if (tab === 'sellOrders') { ct.innerHTML = '<h4 style="margin-bottom:14px">💰 卖出记录</h4><div id="sellOrderList"></div>'; loadOrders('seller', 'sellOrderList'); }
  else if (tab === 'myReviews') { ct.innerHTML = '<h4 style="margin-bottom:14px">⭐ 我的评价</h4><div id="reviewsWrap"></div>'; loadMyReviews(); }
  else if (tab === 'cart') { ct.innerHTML = '<h4 style="margin-bottom:14px">🛒 购物车</h4><div id="cartList"></div>'; loadCart(); }
  else if (tab === 'favorites') { ct.innerHTML = '<h4 style="margin-bottom:14px">♥ 我的收藏</h4><div id="favList"></div>'; loadFavorites(); }
  else if (tab === 'history') { ct.innerHTML = '<h4 style="margin-bottom:14px">🕐 浏览历史</h4><div id="histList"></div>'; loadHistory(); }
  else if (tab === 'addresses') { ct.innerHTML = '<h4 style="margin-bottom:14px">📍 收货地址</h4><div id="addrList"></div><button class="mall-btn mall-btn-primary" onclick="showAddrForm()" style="margin-bottom:12px">+ 添加新地址</button><div id="addrFormWrap"></div>'; loadAddresses(); }
  else if (tab === 'settings') {
    // 统一用动态生成的 SVG data URI 显示头像（含默认头像）
    var avatarUrl = api.resolveAvatarUrl(currentUser.avatar, currentUser.username);
    var fallbackUrl = api.generateDefaultAvatar(currentUser.username).replace(/'/g, '%27');
    var hasCustomAvatar = currentUser.avatar && currentUser.avatar.trim() !== '' && currentUser.avatar !== '/resources/default-avatar.svg';
    var avatarPreview = '<img src="' + escHtml(avatarUrl) + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;flex-shrink:0" onerror="this.src=\'' + fallbackUrl + '\'">';
    var resetBtn = hasCustomAvatar
      ? ' <button class="mall-btn mall-btn-sm" onclick="resetAvatar()" style="margin-left:6px">恢复默认</button>'
      : '';
    ct.innerHTML = '<h4 style="margin-bottom:14px">⚙️ 账号设置</h4>' +
      '<div class="profile-form">' +
        '<div style="display:flex;align-items:center;gap:16px;margin-bottom:18px;padding:14px;background:#fafafa;border-radius:10px">' +
          '<div id="avatarPreview">' + avatarPreview + '</div>' +
          '<div>' +
            '<div style="font-weight:600;margin-bottom:4px">个人头像</div>' +
            '<div style="font-size:12px;color:#6b7280;margin-bottom:8px">支持 JPG/PNG，方形裁剪，显示为圆形' + (hasCustomAvatar ? '；当前为自定义头像' : '；当前为默认头像') + '</div>' +
            '<button class="mall-btn mall-btn-primary mall-btn-sm" onclick="openAvatarCropper()">上传头像</button>' + resetBtn +
          '</div>' +
        '</div>' +
        '<div class="form-row"><div><label>用户名</label><div style="padding:10px;color:var(--text-light)">' + escHtml(currentUser.username) + '</div></div><div><label>昵称</label><input type="text" id="setNickname" value="' + escHtml(currentUser.nickname || '') + '"></div></div>' +
        '<div class="form-row"><div><label>手机号</label><input type="text" id="setPhone" value="' + escHtml(currentUser.phone || '') + '"></div><div><label>邮箱</label><input type="email" id="setEmail" value="' + escHtml(currentUser.email || '') + '"></div></div>' +
        '<button class="mall-btn mall-btn-primary" onclick="saveSettings()">保存修改</button>' +
      '</div>';
  }
  else if (tab === 'changePwd') {
    ct.innerHTML = '<h4 style="margin-bottom:14px">🔒 修改密码</h4><div class="profile-form"><div class="form-row"><div><label>原密码</label><input type="password" id="oldPwd" placeholder="请输入原密码"></div></div><div class="form-row"><div><label>新密码</label><input type="password" id="newPwd" placeholder="至少6位"></div><div><label>确认新密码</label><input type="password" id="newPwd2" placeholder="再次输入"></div></div><button class="mall-btn mall-btn-primary" onclick="changePassword()">修改密码</button></div>';
  }
}

function loadMyProducts() {
  api.get('/products/my').then(function(res) {
    var el = document.getElementById('myProdList');
    if (res.code !== 200 || !res.data.list || !res.data.list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>还没有发布商品</p><br><a href="publish.html" class="mall-btn mall-btn-primary">立即发布</a></div>'; return; }
    el.innerHTML = res.data.list.map(function(p) {
      var statusLabel = p.status === 'selling' ? '在售' : p.status === 'sold_out' ? '已售罄' : p.status === 'reserved' ? '已预留' : p.status === 'hidden' ? '已下架' : p.status;
      var statusBg = p.status === 'selling' ? '#DCFCE7' : '#F1F5F9';
      var statusColor = p.status === 'selling' ? '#16A34A' : '#64748B';
      var manageBtns = '';
      if (p.status === 'selling') {
        manageBtns = '<button class="mall-btn mall-btn-sm" onclick="event.stopPropagation();toggleProductStatus(\'' + p.id + '\',\'hidden\')">下架</button> ';
      } else if (p.status === 'hidden') {
        manageBtns = '<button class="mall-btn mall-btn-sm mall-btn-primary" onclick="event.stopPropagation();toggleProductStatus(\'' + p.id + '\',\'selling\')">上架</button> ';
      }
      manageBtns += '<button class="mall-btn mall-btn-sm" onclick="event.stopPropagation();editProduct(\'' + p.id + '\')">编辑</button> ';
      manageBtns += '<button class="mall-btn mall-btn-sm mall-btn-danger" onclick="event.stopPropagation();deleteProduct(\'' + p.id + '\')">删除</button>';
      return '<div class="order-item" onclick="location.href=\'product-detail.html?id=' + p.id + '\'"><div class="order-item-img"><img src="' + (p.images && p.images[0] ? p.images[0] : '/resources/default-product.gif') + '" alt="" onerror="this.src=\'/resources/default-product.gif\'"></div><div class="order-item-info"><div class="order-item-title">' + escHtml(p.title) + '</div><div class="order-item-meta">' + getCategoryLabel(p.category) + ' · ' + getCampusLabel(p.campus) + ' · ' + formatDate(p.createdAt) + '</div></div><div style="text-align:right"><div class="order-item-price">¥' + p.price + '</div><span class="order-status-badge" style="background:' + statusBg + ';color:' + statusColor + '">' + statusLabel + '</span><div style="margin-top:6px;display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">' + manageBtns + '</div></div></div>';
    }).join('');
  }).catch(function() {});
}

function toggleProductStatus(productId, status) {
  api.put('/products/' + productId, { status: status }).then(function(res) {
    if (res.code === 200) { showToast(status === 'hidden' ? '已下架' : '已上架'); loadMyProducts(); }
    else { showToast(res.message || '操作失败', 'error'); }
  });
}

function editProduct(productId) {
  location.href = 'publish.html?id=' + productId;
}

function deleteProduct(productId) {
  if (!confirm('确定删除该商品吗？删除后不可恢复')) return;
  api.delete('/products/' + productId).then(function(res) {
    if (res.code === 200) { showToast('已删除'); loadMyProducts(); }
    else { showToast(res.message || '删除失败', 'error'); }
  });
}

function loadOrders(role, containerId) {
  api.get('/orders', { role: role }).then(function(res) {
    var el = document.getElementById(containerId);
    if (res.code !== 200 || !res.data.list || !res.data.list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">' + (role === 'buyer' ? '🛒' : '💰') + '</div><p>暂无' + (role === 'buyer' ? '购买' : '卖出') + '记录</p></div>'; return; }
    el.innerHTML = res.data.list.map(function(o) {
      var statusMap = {pending:'待处理',accepted:'已接受',shipped:'已发货',completed:'已完成',rejected:'已拒绝',cancelled:'已取消'};
      var s = statusMap[o.status] || o.status;
      var bgColor = o.status==='completed'?'#DCFCE7':o.status==='pending'?'#FEF3C7':o.status==='shipped'||o.status==='accepted'?'#DBEAFE':'#F1F5F9';
      var textColor = o.status==='completed'?'#16A34A':o.status==='rejected'?'#EF4444':o.status==='cancelled'?'#6B7280':'#D97706';
      var actions = '';
      if (o.status === 'pending' && role === 'seller') {
        actions = '<div style="margin-top:6px"><button class="mall-btn mall-btn-primary mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'accepted\')">接受</button> <button class="mall-btn mall-btn-danger mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'rejected\')">拒绝</button></div>';
      }
      if (o.status === 'accepted' && role === 'seller') {
        actions = '<div style="margin-top:6px"><button class="mall-btn mall-btn-primary mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'shipped\')">标记发货</button></div>';
      }
      if (o.status === 'shipped' && role === 'buyer') {
        actions = '<div style="margin-top:6px"><button class="mall-btn mall-btn-primary mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'completed\')">确认收货</button></div>';
      }
      if ((o.status === 'pending' || o.status === 'accepted') && role === 'buyer') {
        actions += '<div style="margin-top:6px"><button class="mall-btn mall-btn-danger mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'cancelled\')">取消订单</button></div>';
      }
      return '<div class="order-item"><div class="order-item-img" style="font-size:24px;display:flex;align-items:center;justify-content:center;">' + (role === 'buyer' ? '🛒' : '💰') + '</div><div class="order-item-info"><div class="order-item-title">' + escHtml(o.productTitle) + '</div><div class="order-item-meta">' + (role === 'buyer' ? '卖家' : '买家') + ': ' + escHtml(role === 'buyer' ? o.sellerName : o.buyerName) + ' · ' + formatDate(o.createdAt) + '</div></div><div style="text-align:right"><div class="order-item-price">¥' + Number(o.price).toFixed(2) + '</div><span class="order-status-badge" style="background:' + bgColor + ';color:' + textColor + '">' + s + '</span>' + actions + '</div></div>';
    }).join('');
  }).catch(function() {});
}

function handleOrder(orderId, status) {
  api.put('/orders/' + orderId + '/status', { status: status }).then(function(res) {
    if (res.code === 200) { showToast('操作成功！'); switchTab('myOrders', document.querySelector('.profile-menu-item[data-tab=myOrders]')); }
    else { showToast(res.message || '操作失败', 'error'); }
  });
}

function saveSettings() {
  var data = { nickname: document.getElementById('setNickname').value.trim(), phone: document.getElementById('setPhone').value.trim(), email: document.getElementById('setEmail').value.trim() };
  api.put('/user/profile', data).then(function(res) {
    if (res.code === 200) { var el = document.createElement('div'); el.className = 'mall-toast success'; el.textContent = '修改成功！'; document.body.appendChild(el); setTimeout(function() { el.remove(); }, 2600); }
    else { var el = document.createElement('div'); el.className = 'mall-toast error'; el.textContent = res.message || '修改失败'; document.body.appendChild(el); setTimeout(function() { el.remove(); }, 2600); }
  });
}

function loadCart() {
  api.getCart().then(function(res) {
    var el = document.getElementById('cartList');
    var items = res.data || [];
    window._cartItems = items;
    if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
    renderCartList();

    function renderCartList() {
      var selected = window._cartSelected || {};
      window._cartSelected = selected;
      var total = 0, count = 0;
      var html = '';
      items.forEach(function(it) {
        var sel = selected[it.id];
        if (sel) { total += it.price * it.quantity; count++; }
        html += '<div class="order-item" style="align-items:center">' +
          '<input type="checkbox" ' + (sel?'checked':'') + ' onclick="var s=window._cartSelected||{}; if(this.checked)s[\'' + it.id + '\']=true; else delete s[\'' + it.id + '\']; loadCart()">' +
          '<div class="order-item-img"><img src="' + (it.productImage||'/resources/default-product.gif') + '" onerror="this.src=\'/resources/default-product.gif\'"></div>' +
          '<div class="order-item-info"><div class="order-item-title">' + escHtml(it.productTitle) + '</div>' + (it.specName?'<div class="order-item-meta">规格: ' + escHtml(it.specName) + '</div>':'') + '<div class="order-item-meta">数量: ' + it.quantity + '</div></div>' +
          '<div style="text-align:right"><div class="order-item-price">¥' + (it.price * it.quantity).toFixed(2) + '</div>' +
          '<button class="mall-btn mall-btn-danger mall-btn-sm" onclick="deleteCartItem(\'' + it.id + '\')">删除</button></div></div>';
      });
      html += '<div style="margin-top:16px;padding:16px;background:#f9fafb;border-radius:8px;display:flex;justify-content:space-between;align-items:center">' +
        '<div>已选 <b>' + count + '</b> 件，合计 <b style="color:#ef4444;font-size:18px">¥' + total.toFixed(2) + '</b></div>' +
        '<div style="display:flex;gap:8px"><button class="mall-btn mall-btn-outline" onclick="batchDelCart()">批量删除</button><button class="mall-btn mall-btn-primary" onclick="batchBuyCart()">一键购买</button></div></div>';
      el.innerHTML = html;
    }

    window.deleteCartItem = function(id) {
      api.removeCartItems(id).then(function() {
        items = items.filter(function(x){ return x.id !== id; });
        var s = window._cartSelected || {}; delete s[id];
        if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
        renderCartList();
      });
    };
    window.batchDelCart = function() {
      var ids = Object.keys(window._cartSelected || {});
      if (!ids.length) { showToast('请先选择商品', 'warning'); return; }
      api.removeCartItems(ids).then(function() {
        ids.forEach(function(id){ var s=window._cartSelected||{}; delete s[id]; });
        items = items.filter(function(x){ return !ids.includes(x.id); });
        if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
        renderCartList();
      });
    };
    window.batchBuyCart = async function() {
      var ids = Object.keys(window._cartSelected || {});
      if (!ids.length) { showToast('请先选择商品', 'warning'); return; }
      // 加载地址列表并弹窗
      var addrRes = await api.get('/addresses');
      showCartAddrModal(addrRes.data || [], ids, items);
    };
  });
}

function loadFavorites() {
  api.getFavorites().then(function(res) {
    var el = document.getElementById('favList');
    var list = res.data || [];
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">♥</div><p>还没有收藏</p></div>'; return; }
    el.innerHTML = list.map(function(f) {
      return '<div class="order-item" onclick="location.href=\'product-detail.html?id=' + f.productId + '\'"><div class="order-item-img"><img src="' + (f.productImage||'/resources/default-product.gif') + '" onerror="this.src=\'/resources/default-product.gif\'"></div><div class="order-item-info"><div class="order-item-title">' + escHtml(f.productTitle) + '</div><div class="order-item-meta">' + formatDate(f.createdAt) + '</div></div><div class="order-item-price">¥' + Number(f.price).toFixed(2) + '</div></div>';
    }).join('');
  });
}

function loadHistory() {
  api.getHistory().then(function(res) {
    var el = document.getElementById('histList');
    var list = res.data || [];
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🕐</div><p>暂无浏览记录</p></div>'; return; }
    el.innerHTML = list.map(function(h) {
      return '<div class="order-item" onclick="location.href=\'product-detail.html?id=' + h.productId + '\'"><div class="order-item-img"><img src="' + (h.productImage||'/resources/default-product.gif') + '" onerror="this.src=\'/resources/default-product.gif\'"></div><div class="order-item-info"><div class="order-item-title">' + escHtml(h.productTitle) + '</div><div class="order-item-meta">最近浏览: ' + formatDate(h.viewedAt) + '</div></div><div class="order-item-price">¥' + Number(h.price).toFixed(2) + '</div></div>';
    }).join('');
  });
}

function changePassword() {
  var oldPwd = document.getElementById('oldPwd').value;
  var newPwd = document.getElementById('newPwd').value;
  var newPwd2 = document.getElementById('newPwd2').value;
  if (!oldPwd) { showToast('请输入原密码', 'error'); return; }
  if (newPwd.length < 6) { showToast('新密码至少6位', 'error'); return; }
  if (newPwd !== newPwd2) { showToast('两次输入不一致', 'error'); return; }
  api.put('/user/change-password', { oldPassword: oldPwd, newPassword: newPwd }).then(function(res) {
    if (res.code === 200) { showToast('密码修改成功'); document.getElementById('oldPwd').value = ''; document.getElementById('newPwd').value = ''; document.getElementById('newPwd2').value = ''; }
    else { showToast(res.message || '修改失败', 'error'); }
  });
}

// ========== 收货地址 ==========
var editingAddrId = null;

function loadAddresses() {
  api.get('/addresses').then(function(res) {
    var el = document.getElementById('addrList');
    var list = res.data || [];
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📍</div><p>还没有收货地址</p></div>'; return; }
    el.innerHTML = list.map(function(a) {
      return '<div class="order-item" style="align-items:center">' +

function escHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }

// ========== 头像上传（方形裁剪 + 圆形预览 + 压缩） ==========
var _avatarCropperState = null;

function openAvatarCropper() {
  // 创建弹窗
  var overlay = document.createElement('div');
  overlay.className = 'avatar-cropper-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  overlay.innerHTML =
    '<div style="background:#fff;border-radius:12px;max-width:480px;width:100%;padding:24px;box-sizing:border-box">' +
      '<h3 style="margin:0 0 16px;font-size:18px">上传头像</h3>' +
      '<div style="font-size:13px;color:#6b7280;margin-bottom:14px">选择图片后拖动调整位置，滚轮缩放，将方形选区内的内容作为头像</div>' +
      '<div id="avatarCropBox" style="position:relative;width:100%;height:300px;background:#f3f4f6;border-radius:8px;overflow:hidden;display:flex;align-items:center;justify-content:center;border:2px dashed #d1d5db">' +
        '<div style="color:#9ca3af;font-size:14px;text-align:center">' +
          '<div style="font-size:32px;margin-bottom:8px">📷</div>' +
          '<div>点击此处选择图片</div>' +
          '<input type="file" id="avatarFileInput" accept="image/*" style="position:absolute;inset:0;opacity:0;cursor:pointer">' +
        '</div>' +
      '</div>' +
      '<div style="margin-top:12px;display:flex;align-items:center;gap:8px;font-size:13px;color:#6b7280">' +
        '<span>缩放</span>' +
        '<input type="range" id="avatarScale" min="0.5" max="3" step="0.05" value="1" style="flex:1" disabled>' +
        '<span id="avatarScaleVal">100%</span>' +
      '</div>' +
      '<div style="margin-top:14px;display:flex;align-items:center;gap:14px">' +
        '<div style="font-size:13px;color:#6b7280">预览:</div>' +
        '<div style="display:flex;gap:10px;align-items:center">' +
          '<canvas id="avatarPreview64" width="64" height="64" style="width:64px;height:64px;border-radius:50%;border:1px solid #e5e7eb"></canvas>' +
          '<canvas id="avatarPreview48" width="48" height="48" style="width:48px;height:48px;border-radius:50%;border:1px solid #e5e7eb"></canvas>' +
          '<canvas id="avatarPreview32" width="32" height="32" style="width:32px;height:32px;border-radius:50%;border:1px solid #e5e7eb"></canvas>' +
        '</div>' +
      '</div>' +
      '<div style="margin-top:18px;display:flex;gap:8px;justify-content:flex-end">' +
        '<button class="mall-btn" onclick="this.closest(\'.avatar-cropper-overlay\').remove()">取消</button>' +
        '<button class="mall-btn mall-btn-primary" id="avatarSubmitBtn" onclick="submitAvatar()" disabled>确认上传</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);

  _avatarCropperState = {
    image: null,        // Image 对象
    imgX: 0, imgY: 0,   // 图片在画布中的中心偏移
    scale: 1,           // 缩放比例
    minScale: 0.5,
    maxScale: 3,
    dragging: false,
    dragStart: { x: 0, y: 0 },
    boxSize: 256        // 输出方形图片尺寸（后端再压缩到 512KB）
  };

  // 文件选择
  document.getElementById('avatarFileInput').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('原图不能超过5MB', 'error'); return; }
    var reader = new FileReader();
    reader.onload = function(ev) {
      var img = new Image();
      img.onload = function() {
        _avatarCropperState.image = img;
        // 初始缩放：让图片短边等于裁剪框尺寸（256）
        var s = _avatarCropperState.boxSize / Math.min(img.width, img.height);
        _avatarCropperState.scale = s;
        _avatarCropperState.minScale = s * 0.5;
        _avatarCropperState.maxScale = s * 3;
        _avatarCropperState.imgX = 0;
        _avatarCropperState.imgY = 0;
        document.getElementById('avatarScale').disabled = false;
        document.getElementById('avatarScale').min = _avatarCropperState.minScale;
        document.getElementById('avatarScale').max = _avatarCropperState.maxScale;
        document.getElementById('avatarScale').value = s;
        document.getElementById('avatarScaleVal').textContent = Math.round(s * 100) + '%';
        document.getElementById('avatarSubmitBtn').disabled = false;
        renderAvatarCropper();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // 缩放滑块
  document.getElementById('avatarScale').addEventListener('input', function(e) {
    if (!_avatarCropperState.image) return;
    _avatarCropperState.scale = parseFloat(e.target.value);
    document.getElementById('avatarScaleVal').textContent = Math.round(_avatarCropperState.scale * 100) + '%';
    renderAvatarCropper();
  });

  // 拖动
  var cropBox = document.getElementById('avatarCropBox');
  cropBox.addEventListener('mousedown', function(e) {
    if (!_avatarCropperState.image) return;
    _avatarCropperState.dragging = true;
    _avatarCropperState.dragStart = { x: e.clientX, y: e.clientY, imgX: _avatarCropperState.imgX, imgY: _avatarCropperState.imgY };
  });
  document.addEventListener('mousemove', onAvatarDrag);
  document.addEventListener('mouseup', function() { _avatarCropperState.dragging = false; });
  // 滚轮缩放
  cropBox.addEventListener('wheel', function(e) {
    if (!_avatarCropperState.image) return;
    e.preventDefault();
    var delta = e.deltaY > 0 ? -0.05 : 0.05;
    _avatarCropperState.scale = Math.max(_avatarCropperState.minScale, Math.min(_avatarCropperState.maxScale, _avatarCropperState.scale + delta));
    document.getElementById('avatarScale').value = _avatarCropperState.scale;
    document.getElementById('avatarScaleVal').textContent = Math.round(_avatarCropperState.scale * 100) + '%';
    renderAvatarCropper();
  }, { passive: false });
}

function onAvatarDrag(e) {
  if (!_avatarCropperState || !_avatarCropperState.dragging || !_avatarCropperState.image) return;
  var dx = e.clientX - _avatarCropperState.dragStart.x;
  var dy = e.clientY - _avatarCropperState.dragStart.y;
  _avatarCropperState.imgX = _avatarCropperState.dragStart.imgX + dx;
  _avatarCropperState.imgY = _avatarCropperState.dragStart.imgY + dy;
  renderAvatarCropper();
}

function renderAvatarCropper() {
  var st = _avatarCropperState;
  if (!st || !st.image) return;
  var cropBox = document.getElementById('avatarCropBox');
  if (!cropBox) return;
  var boxW = cropBox.clientWidth;
  var boxH = cropBox.clientHeight;
  // 清空 box 内容（除了文件输入）
  var fileInput = document.getElementById('avatarFileInput');
  cropBox.innerHTML = '';
  cropBox.style.border = 'none';

  var canvas = document.createElement('canvas');
  canvas.width = boxW;
  canvas.height = boxH;
  canvas.style.display = 'block';
  var ctx = canvas.getContext('2d');
  // 计算图片绘制位置（以 box 中心为基准，应用偏移和缩放）
  var img = st.image;
  var drawW = img.width * st.scale;
  var drawH = img.height * st.scale;
  var cx = boxW / 2 + st.imgX;
  var cy = boxH / 2 + st.imgY;
  ctx.fillStyle = '#1f2937';
  ctx.fillRect(0, 0, boxW, boxH);
  ctx.drawImage(img, cx - drawW / 2, cy - drawH / 2, drawW, drawH);

  // 绘制方形裁剪框（居中，边长 = boxSize 缩放到显示尺寸）
  var cropDisplaySize = Math.min(boxW, boxH) - 20;
  var cropX = (boxW - cropDisplaySize) / 2;
  var cropY = (boxH - cropDisplaySize) / 2;
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.strokeRect(cropX, cropY, cropDisplaySize, cropDisplaySize);
  // 遮罩：裁剪框外半透明
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, boxW, cropY); // 上
  ctx.fillRect(0, cropY + cropDisplaySize, boxW, boxH - cropY - cropDisplaySize); // 下
  ctx.fillRect(0, cropY, cropX, cropDisplaySize); // 左
  ctx.fillRect(cropX + cropDisplaySize, cropY, boxW - cropX - cropDisplaySize, cropDisplaySize); // 右

  cropBox.appendChild(canvas);

  // 渲染预览（圆形）
  renderAvatarPreviews(canvas, cropX, cropY, cropDisplaySize);
}

function renderAvatarPreviews(srcCanvas, cropX, cropY, cropSize) {
  var sizes = [64, 48, 32];
  sizes.forEach(function(s) {
    var c = document.getElementById('avatarPreview' + s);
    if (!c) return;
    var ctx = c.getContext('2d');
    ctx.clearRect(0, 0, s, s);
    // 圆形遮罩
    ctx.save();
    ctx.beginPath();
    ctx.arc(s / 2, s / 2, s / 2, 0, Math.PI * 2);
    ctx.clip();
    // 把裁剪框内容画到预览
    ctx.drawImage(srcCanvas, cropX, cropY, cropSize, cropSize, 0, 0, s, s);
    ctx.restore();
  });
}

async function submitAvatar() {
  var st = _avatarCropperState;
  if (!st || !st.image) { showToast('请先选择图片', 'warning'); return; }
  var cropBox = document.getElementById('avatarCropBox');
  var canvas = cropBox.querySelector('canvas');
  if (!canvas) { showToast('裁剪失败', 'error'); return; }
  var boxW = cropBox.clientWidth;
  var boxH = cropBox.clientHeight;
  var cropDisplaySize = Math.min(boxW, boxH) - 20;
  var cropX = (boxW - cropDisplaySize) / 2;
  var cropY = (boxH - cropDisplaySize) / 2;

  // 输出 256x256 方形 canvas
  var outCanvas = document.createElement('canvas');
  var outSize = 256;
  outCanvas.width = outSize;
  outCanvas.height = outSize;
  var outCtx = outCanvas.getContext('2d');
  outCtx.drawImage(canvas, cropX, cropY, cropDisplaySize, cropDisplaySize, 0, 0, outSize, outSize);

  // 转 Blob（先尝试 JPEG 高质量，再逐步降质直到 < 512KB）
  var blob = await canvasToBlobUnderSize(outCanvas, 512 * 1024, 'image/jpeg', 0.9);
  if (!blob) { showToast('图片处理失败', 'error'); return; }
  var file = new File([blob], 'avatar.jpg', { type: 'image/jpeg' });

  // 上传
  var btn = document.getElementById('avatarSubmitBtn');
  btn.disabled = true;
  btn.textContent = '上传中…';
  var res = await api.uploadAvatar(file);
  btn.disabled = false;
  btn.textContent = '确认上传';
  if (res.code === 200 && res.data && res.data.avatar) {
    currentUser.avatar = res.data.avatar;
    showToast('头像已更新');
    document.querySelector('.avatar-cropper-overlay').remove();
    // 刷新头像预览（使用统一工具，避免 default-avatar.svg 不带字母的问题）
    var previewEl = document.getElementById('avatarPreview');
    if (previewEl) {
      var url = api.resolveAvatarUrl(currentUser.avatar, currentUser.username);
      var fallbackUrl = api.generateDefaultAvatar(currentUser.username).replace(/'/g, '%27');
      previewEl.innerHTML = '<img src="' + escHtml(url) + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover" onerror="this.src=\'' + fallbackUrl + '\'">';
    }
    renderSidebarProfile();
    // 重新渲染 settings tab 以更新"恢复默认"按钮显示
    switchTab('settings', document.querySelector('.profile-menu-item[data-tab=settings]'));
    // 通知顶部导航栏更新
    if (window.SiteHeader && typeof SiteHeader.refresh === 'function') SiteHeader.refresh();
  } else {
    showToast(res.message || '上传失败', 'error');
  }
}

  if (!confirm('确定恢复为默认头像吗？当前自定义头像将被删除')) return;

  }
}

// 将 canvas 转为 Blob，逐步降低质量直到小于 maxSize
function canvasToBlobUnderSize(canvas, maxSize, mimeType, startQuality) {
  return new Promise(function(resolve) {
    var q = startQuality || 0.9;
    function tryQuality() {
      canvas.toBlob(function(blob) {
        if (!blob) { resolve(null); return; }
        if (blob.size <= maxSize || q <= 0.3) { resolve(blob); return; }
        q -= 0.1;
        tryQuality();
      }, mimeType, q);
    }
    tryQuality();
  });
}

var _cartAddrId = null;
function showCartAddrModal(addresses, ids, items) {
  _cartAddrId = null;
  var html = '<div class="addr-modal-overlay" id="addrModalOverlay" onclick="if(event.target===this)closeAddrModal()">';
  html += '<div class="addr-modal"><h3>选择收货地址</h3>';
  if (addresses.length > 0) {
    addresses.forEach(function(a) {
      html += '<label class="addr-option' + (a.isDefault ? ' selected' : '') + '" onclick="selectCartAddr(this,\'' + a.id + '\')">';
      html += '<input type="radio" name="addrRadio" value="' + a.id + '"' + (a.isDefault ? ' checked' : '') + '>';
      html += '<div class="addr-info"><div class="addr-name">' + escHtml(a.campus||'') + (a.building ? ' ' + escHtml(a.building) + '栋' : '') + (a.dormNumber ? ' ' + escHtml(a.dormNumber) : '') + (a.isDefault ? ' <span style="color:#22c55e;font-size:11px;font-weight:600">默认</span>' : '') + '</div>';
      html += '<div class="addr-detail">' + escHtml(a.phone||'无电话') + '</div></div></label>';
      if (a.isDefault) _cartAddrId = a.id;
    });
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddrModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="doCartBuy(\'' + ids.join(',') + '\')">确认下单</button></div>';
  } else {
    html += '<p style="color:#6b7280;margin-bottom:12px">您还没有收货地址，请先在"收货地址"中添加</p>';
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddrModal()">取消</button></div>';
  }
  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  if (!_cartAddrId && addresses.length > 0) {
    var def = addresses.find(function(a){return a.isDefault;});
    if (def) {
      _cartAddrId = def.id;
    } else {
      _cartAddrId = addresses[0].id;
      var firstOption = document.querySelector('.addr-option');
      if (firstOption) {
        firstOption.classList.add('selected');
        var radio = firstOption.querySelector('input[type=radio]');
        if (radio) radio.checked = true;
      }
    }
  }
}
function selectCartAddr(el, id) { _cartAddrId = id; document.querySelectorAll('.addr-option').forEach(function(o){o.classList.remove('selected');}); el.classList.add('selected'); }
function closeAddrModal() { var o = document.getElementById('addrModalOverlay'); if (o) o.remove(); }

async function doCartBuy(idsStr) {
  if (!_cartAddrId) { showToast('请选择收货地址', 'error'); return; }
  closeAddrModal();
  var ids = idsStr.split(',');
  var allItems = window._cartItems || [];
  var succ = 0;
  for (var i = 0; i < ids.length; i++) {
    var it = allItems.find(function(x){ return x.id === ids[i]; });
    if (!it) continue;
    var r = await api.post('/orders', { productId: it.productId, price: it.price, quantity: it.quantity, spec: it.specName, addressId: _cartAddrId });
    if (r.code === 200) succ++;
  }
  if (succ > 0) {
    await api.removeCartItems(ids);
    showToast('成功购买 ' + succ + ' 件商品');
    loadCart();
  } else {
    showToast('购买失败', 'error');
  }
}
