<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
</head>
<body>
<div class="nav-sticky-wrap">
  <div class="top-nav"><div class="top-nav-inner"><span>欢迎来到校园二手交易平台！</span><div id="topNavRight"><a href="login.html">请登录</a><a href="register.html">免费注册</a></div></div></div>
  <header class="main-header subpage"><div class="header-inner"><div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer"><div class="logo-icon">📚</div><div><div class="logo-text">校园二手</div><div class="logo-sub">闲置交易平台</div></div></div><a href="../index.html" class="header-back"><span class="arrow">←</span> 返回首页</a></div></header>
</div>

<div class="profile-wrap">
  <aside class="profile-sidebar">
    <div class="profile-header" id="sidebarProfile"></div>
    <div class="profile-menu">
      <div class="profile-menu-item active" data-tab="myProducts" onclick="switchTab('myProducts',this)">📦 我的商品</div>
      <div class="profile-menu-item" data-tab="myOrders" onclick="switchTab('myOrders',this)">📋 购买记录</div>
      <div class="profile-menu-item" data-tab="sellOrders" onclick="switchTab('sellOrders',this)">💰 卖出记录</div>
      <div class="profile-menu-item" data-tab="myReviews" onclick="switchTab('myReviews',this)">⭐ 我的评价</div>
      <div class="profile-menu-item" data-tab="cart" onclick="switchTab('cart',this)">🛒 购物车</div>
      <div class="profile-menu-item" data-tab="favorites" onclick="switchTab('favorites',this)">♥ 我的收藏</div>
      <div class="profile-menu-item" data-tab="history" onclick="switchTab('history',this)">🕐 浏览历史</div>
      <div class="profile-menu-item" data-tab="addresses" onclick="switchTab('addresses',this)">📍 收货地址</div>
      <div class="profile-menu-item" data-tab="settings" onclick="switchTab('settings',this)">⚙️ 账号设置</div>
      <div class="profile-menu-item" data-tab="changePwd" onclick="switchTab('changePwd',this)">🔒 修改密码</div>
    </div>
  </aside>
  <section class="profile-content" id="profileContent"></section>
</div>

<script src="../js/api.js"></script>
<script>
var currentUser = null;

(function() {
  api.verifyAndInit().then(function(ok) {
    if (!ok) { location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
    var user = api.getUser();
    if (user) {
      document.getElementById('topNavRight').innerHTML =
        '<span>Hi, <b>' + escHtml(user.username) + '</b></span>' +
        '<a href="../index.html">首页</a>' +
        '<a href="orders.html">我的订单</a>' +
        '<a href="javascript:void(0)" onclick="api.logout()">退出</a>';
    }
    api.get('/user/me').then(function(res) {
      if (res.code !== 200) { api.logout(); return; }
      currentUser = res.data;
      document.getElementById('sidebarProfile').innerHTML =
        '<div class="profile-avatar">' + currentUser.username[0].toUpperCase() + '</div>' +
        '<div class="profile-name">' + escHtml(currentUser.nickname || currentUser.username) + '</div>' +
        '<div class="profile-role">' + (currentUser.role === 'admin' ? '管理员' : '在校学生') + '</div>';
      switchTab('myProducts', document.querySelector('.profile-menu-item[data-tab=myProducts]'));
    });
  });
})();

function switchTab(tab, el) {
  document.querySelectorAll('.profile-menu-item').forEach(function(i) { i.classList.remove('active'); });
  el.classList.add('active');
  var ct = document.getElementById('profileContent');
  if (tab === 'myProducts') { ct.innerHTML = '<h4 style="margin-bottom:14px">📦 我的商品</h4><div id="myProdList"></div>'; loadMyProducts(); }
  else if (tab === 'myOrders') { ct.innerHTML = '<h4 style="margin-bottom:14px">📋 购买记录</h4><div id="buyOrderList"></div>'; loadOrders('buyer', 'buyOrderList'); }
  else if (tab === 'sellOrders') { ct.innerHTML = '<h4 style="margin-bottom:14px">💰 卖出记录</h4><div id="sellOrderList"></div>'; loadOrders('seller', 'sellOrderList'); }
  else if (tab === 'myReviews') { ct.innerHTML = '<h4 style="margin-bottom:14px">⭐ 我的评价</h4><div id="reviewsWrap"></div>'; loadMyReviews(); }
  else if (tab === 'cart') { ct.innerHTML = '<h4 style="margin-bottom:14px">🛒 购物车</h4><div id="cartList"></div>'; loadCart(); }
  else if (tab === 'favorites') { ct.innerHTML = '<h4 style="margin-bottom:14px">♥ 我的收藏</h4><div id="favList"></div>'; loadFavorites(); }
  else if (tab === 'history') { ct.innerHTML = '<h4 style="margin-bottom:14px">🕐 浏览历史</h4><div id="histList"></div>'; loadHistory(); }
  else if (tab === 'addresses') { ct.innerHTML = '<h4 style="margin-bottom:14px">📍 收货地址</h4><div id="addrList"></div><button class="mall-btn mall-btn-primary" onclick="showAddrForm()" style="margin-bottom:12px">+ 添加新地址</button><div id="addrFormWrap"></div>'; loadAddresses(); }
  else if (tab === 'settings') {
    ct.innerHTML = '<h4 style="margin-bottom:14px">⚙️ 账号设置</h4><div class="profile-form"><div class="form-row"><div><label>用户名</label><div style="padding:10px;color:var(--text-light)">' + escHtml(currentUser.username) + '</div></div><div><label>昵称</label><input type="text" id="setNickname" value="' + escHtml(currentUser.nickname || '') + '"></div></div><div class="form-row"><div><label>手机号</label><input type="text" id="setPhone" value="' + escHtml(currentUser.phone || '') + '"></div><div><label>邮箱</label><input type="email" id="setEmail" value="' + escHtml(currentUser.email || '') + '"></div></div><button class="mall-btn mall-btn-primary" onclick="saveSettings()">保存修改</button></div>';
  }
  else if (tab === 'changePwd') {
    ct.innerHTML = '<h4 style="margin-bottom:14px">🔒 修改密码</h4><div class="profile-form"><div class="form-row"><div><label>原密码</label><input type="password" id="oldPwd" placeholder="请输入原密码"></div></div><div class="form-row"><div><label>新密码</label><input type="password" id="newPwd" placeholder="至少6位"></div><div><label>确认新密码</label><input type="password" id="newPwd2" placeholder="再次输入"></div></div><button class="mall-btn mall-btn-primary" onclick="changePassword()">修改密码</button></div>';
  }
}

function loadMyProducts() {
  api.get('/products/my').then(function(res) {
    var el = document.getElementById('myProdList');
    if (res.code !== 200 || !res.data.list || !res.data.list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><p>还没有发布商品</p><br><a href="publish.html" class="mall-btn mall-btn-primary">立即发布</a></div>'; return; }
    el.innerHTML = res.data.list.map(function(p) {
      return '<div class="order-item" onclick="location.href=\'product-detail.html?id=' + p.id + '\'"><div class="order-item-img"><img src="' + (p.images && p.images[0] ? p.images[0] : 'https://picsum.photos/seed/mp' + p.id + '/64/64') + '" alt="" onerror="this.src=\'https://picsum.photos/seed/fb' + p.id + '/64/64\'"></div><div class="order-item-info"><div class="order-item-title">' + escHtml(p.title) + '</div><div class="order-item-meta">' + getCategoryLabel(p.category) + ' · ' + getCampusLabel(p.campus) + ' · ' + formatDate(p.createdAt) + '</div></div><div><div class="order-item-price">¥' + p.price + '</div><span class="order-status-badge" style="background:' + (p.status === 'selling' ? '#DCFCE7' : '#F1F5F9') + ';color:' + (p.status === 'selling' ? '#16A34A' : '#64748B') + '">' + (p.status === 'selling' ? '在售' : p.status) + '</span></div></div>';
    }).join('');
  }).catch(function() {});
}

function loadOrders(role, containerId) {
  api.get('/orders', { role: role }).then(function(res) {
    var el = document.getElementById(containerId);
    if (res.code !== 200 || !res.data.list || !res.data.list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">' + (role === 'buyer' ? '🛒' : '💰') + '</div><p>暂无' + (role === 'buyer' ? '购买' : '卖出') + '记录</p></div>'; return; }
    el.innerHTML = res.data.list.map(function(o) {
      var statusMap = {pending:'待处理',accepted:'已接受',shipped:'已发货',completed:'已完成',rejected:'已拒绝',cancelled:'已取消'};
      var s = statusMap[o.status] || o.status;
      var bgColor = o.status==='completed'?'#DCFCE7':o.status==='pending'?'#FEF3C7':o.status==='shipped'||o.status==='accepted'?'#DBEAFE':'#F1F5F9';
      var textColor = o.status==='completed'?'#16A34A':o.status==='rejected'?'#EF4444':o.status==='cancelled'?'#6B7280':'#D97706';
      var actions = '';
      if (o.status === 'pending' && role === 'seller') {
        actions = '<div style="margin-top:6px"><button class="mall-btn mall-btn-primary mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'accepted\')">接受</button> <button class="mall-btn mall-btn-danger mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'rejected\')">拒绝</button></div>';
      }
      if (o.status === 'accepted' && role === 'seller') {
        actions = '<div style="margin-top:6px"><button class="mall-btn mall-btn-primary mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'shipped\')">标记发货</button></div>';
      }
      if (o.status === 'shipped' && role === 'buyer') {
        actions = '<div style="margin-top:6px"><button class="mall-btn mall-btn-primary mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'completed\')">确认收货</button></div>';
      }
      if ((o.status === 'pending' || o.status === 'accepted') && role === 'buyer') {
        actions += '<div style="margin-top:6px"><button class="mall-btn mall-btn-danger mall-btn-sm" onclick="event.stopPropagation();handleOrder(\'' + o.id + '\',\'cancelled\')">取消订单</button></div>';
      }
      return '<div class="order-item"><div class="order-item-img" style="font-size:24px;display:flex;align-items:center;justify-content:center;">' + (role === 'buyer' ? '🛒' : '💰') + '</div><div class="order-item-info"><div class="order-item-title">' + escHtml(o.productTitle) + '</div><div class="order-item-meta">' + (role === 'buyer' ? '卖家' : '买家') + ': ' + escHtml(role === 'buyer' ? o.sellerName : o.buyerName) + ' · ' + formatDate(o.createdAt) + '</div></div><div style="text-align:right"><div class="order-item-price">¥' + Number(o.price).toFixed(2) + '</div><span class="order-status-badge" style="background:' + bgColor + ';color:' + textColor + '">' + s + '</span>' + actions + '</div></div>';
    }).join('');
  }).catch(function() {});
}

function handleOrder(orderId, status) {
  api.put('/orders/' + orderId + '/status', { status: status }).then(function(res) {
    if (res.code === 200) { showToast('操作成功！'); switchTab('myOrders', document.querySelector('.profile-menu-item[data-tab=myOrders]')); }
    else { showToast(res.message || '操作失败', 'error'); }
  });
}

function saveSettings() {
  var data = { nickname: document.getElementById('setNickname').value.trim(), phone: document.getElementById('setPhone').value.trim(), email: document.getElementById('setEmail').value.trim() };
  api.put('/user/profile', data).then(function(res) {
    if (res.code === 200) { var el = document.createElement('div'); el.className = 'mall-toast success'; el.textContent = '修改成功！'; document.body.appendChild(el); setTimeout(function() { el.remove(); }, 2600); }
    else { var el = document.createElement('div'); el.className = 'mall-toast error'; el.textContent = res.message || '修改失败'; document.body.appendChild(el); setTimeout(function() { el.remove(); }, 2600); }
  });
}

function loadCart() {
  api.getCart().then(function(res) {
    var el = document.getElementById('cartList');
    var items = res.data || [];
    if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
    renderCartList();

    function renderCartList() {
      var selected = window._cartSelected || {};
      window._cartSelected = selected;
      var total = 0, count = 0;
      var html = '';
      items.forEach(function(it) {
        var sel = selected[it.id];
        if (sel) { total += it.price * it.quantity; count++; }
        html += '<div class="order-item" style="align-items:center">' +
          '<input type="checkbox" ' + (sel?'checked':'') + ' onclick="var s=window._cartSelected||{}; if(this.checked)s[\'' + it.id + '\']=true; else delete s[\'' + it.id + '\']; loadCart()">' +
          '<div class="order-item-img"><img src="' + (it.productImage||'/resources/default-product.gif') + '" onerror="this.src=\'/resources/default-product.gif\'"></div>' +
          '<div class="order-item-info"><div class="order-item-title">' + escHtml(it.productTitle) + '</div>' + (it.specName?'<div class="order-item-meta">规格: ' + escHtml(it.specName) + '</div>':'') + '<div class="order-item-meta">数量: ' + it.quantity + '</div></div>' +
          '<div style="text-align:right"><div class="order-item-price">¥' + (it.price * it.quantity).toFixed(2) + '</div>' +
          '<button class="mall-btn mall-btn-danger mall-btn-sm" onclick="deleteCartItem(\'' + it.id + '\')">删除</button></div></div>';
      });
      html += '<div style="margin-top:16px;padding:16px;background:#f9fafb;border-radius:8px;display:flex;justify-content:space-between;align-items:center">' +
        '<div>已选 <b>' + count + '</b> 件，合计 <b style="color:#ef4444;font-size:18px">¥' + total.toFixed(2) + '</b></div>' +
        '<div style="display:flex;gap:8px"><button class="mall-btn mall-btn-outline" onclick="batchDelCart()">批量删除</button><button class="mall-btn mall-btn-primary" onclick="batchBuyCart()">一键购买</button></div></div>';
      el.innerHTML = html;
    }

    window.deleteCartItem = function(id) {
      api.removeCartItems(id).then(function() {
        items = items.filter(function(x){ return x.id !== id; });
        var s = window._cartSelected || {}; delete s[id];
        if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
        renderCartList();
      });
    };
    window.batchDelCart = function() {
      var ids = Object.keys(window._cartSelected || {});
      if (!ids.length) { showToast('请先选择商品', 'warning'); return; }
      api.removeCartItems(ids).then(function() {
        ids.forEach(function(id){ var s=window._cartSelected||{}; delete s[id]; });
        items = items.filter(function(x){ return !ids.includes(x.id); });
        if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
        renderCartList();
      });
    };
    window.batchBuyCart = async function() {
      var ids = Object.keys(window._cartSelected || {});
      if (!ids.length) { showToast('请先选择商品', 'warning'); return; }
      var succ = 0;
      for (var i = 0; i < ids.length; i++) {
        var it = items.find(function(x){ return x.id === ids[i]; });
        if (!it) continue;
        var r = await api.post('/orders', { productId: it.productId, price: it.price, quantity: it.quantity, spec: it.specName });
        if (r.code === 200) succ++;
      }
      if (succ > 0) {
        await api.removeCartItems(ids);
        ids.forEach(function(id){ var s=window._cartSelected||{}; delete s[id]; });
        items = items.filter(function(x){ return !ids.includes(x.id); });
        if (!items.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><p>购物车空空如也</p></div>'; return; }
        renderCartList();
      }
      showToast('成功购买 ' + succ + ' 件商品');
    };
  });
}

function loadFavorites() {
  api.getFavorites().then(function(res) {
    var el = document.getElementById('favList');
    var list = res.data || [];
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">♥</div><p>还没有收藏</p></div>'; return; }
    el.innerHTML = list.map(function(f) {
      return '<div class="order-item" onclick="location.href=\'product-detail.html?id=' + f.productId + '\'"><div class="order-item-img"><img src="' + (f.productImage||'/resources/default-product.gif') + '" onerror="this.src=\'/resources/default-product.gif\'"></div><div class="order-item-info"><div class="order-item-title">' + escHtml(f.productTitle) + '</div><div class="order-item-meta">' + formatDate(f.createdAt) + '</div></div><div class="order-item-price">¥' + Number(f.price).toFixed(2) + '</div></div>';
    }).join('');
  });
}

function loadHistory() {
  api.getHistory().then(function(res) {
    var el = document.getElementById('histList');
    var list = res.data || [];
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🕐</div><p>暂无浏览记录</p></div>'; return; }
    el.innerHTML = list.map(function(h) {
      return '<div class="order-item" onclick="location.href=\'product-detail.html?id=' + h.productId + '\'"><div class="order-item-img"><img src="' + (h.productImage||'/resources/default-product.gif') + '" onerror="this.src=\'/resources/default-product.gif\'"></div><div class="order-item-info"><div class="order-item-title">' + escHtml(h.productTitle) + '</div><div class="order-item-meta">最近浏览: ' + formatDate(h.viewedAt) + '</div></div><div class="order-item-price">¥' + Number(h.price).toFixed(2) + '</div></div>';
    }).join('');
  });
}

function changePassword() {
  var oldPwd = document.getElementById('oldPwd').value;
  var newPwd = document.getElementById('newPwd').value;
  var newPwd2 = document.getElementById('newPwd2').value;
  if (!oldPwd) { showToast('请输入原密码', 'error'); return; }
  if (newPwd.length < 6) { showToast('新密码至少6位', 'error'); return; }
  if (newPwd !== newPwd2) { showToast('两次输入不一致', 'error'); return; }
  api.put('/user/change-password', { oldPassword: oldPwd, newPassword: newPwd }).then(function(res) {
    if (res.code === 200) { showToast('密码修改成功'); document.getElementById('oldPwd').value = ''; document.getElementById('newPwd').value = ''; document.getElementById('newPwd2').value = ''; }
    else { showToast(res.message || '修改失败', 'error'); }
  });
}

// ========== 收货地址 ==========
var editingAddrId = null;

function loadAddresses() {
  api.get('/addresses').then(function(res) {
    var el = document.getElementById('addrList');
    var list = res.data || [];
    if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📍</div><p>还没有收货地址</p></div>'; return; }
    el.innerHTML = list.map(function(a) {
      return '<div class="order-item" style="align-items:center">' +
        '<div style="flex:1"><b>' + escHtml(a.campus||'') + '</b>' + (a.building ? ' ' + escHtml(a.building) + '栋' : '') + (a.dormNumber ? ' ' + escHtml(a.dormNumber) : '') + '<br><span style="font-size:12px;color:#6b7280">' + escHtml(a.phone||'无电话') + '</span>' + (a.isDefault ? ' <span style="color:#22c55e;font-size:11px;font-weight:600">默认</span>' : '') + '</div>' +
        '<button class="mall-btn mall-btn-sm" onclick="editAddr(\'' + a.id + '\')">编辑</button>' +
        '<button class="mall-btn mall-btn-sm mall-btn-danger" onclick="deleteAddr(\'' + a.id + '\')" style="margin-left:4px">删除</button>' +
        '</div>';
    }).join('');
  });
}

function showAddrForm() {
  editingAddrId = null;
  document.getElementById('addrFormWrap').innerHTML =
    '<div class="profile-form" style="margin-top:12px;padding:16px;background:#f9fafb;border-radius:8px">' +
    '<div class="form-row"><div><label>联系电话</label><input type="text" id="addrPhone" placeholder="手机号"></div><div><label>校区</label><select id="addrCampus">' + CAMPUSES.map(function(c){return '<option value="'+c.value+'">'+c.label+'</option>'}).join('') + '</select></div></div>' +
    '<div class="form-row"><div><label>楼栋</label><input type="text" id="addrBuilding" placeholder="如: 5号楼"></div><div><label>宿舍号</label><input type="text" id="addrDorm" placeholder="如: 302"></div></div>' +
    '<div style="margin:8px 0"><label><input type="checkbox" id="addrDefault"> 设为默认地址</label></div>' +
    '<button class="mall-btn mall-btn-primary" onclick="saveAddr()">保存地址</button>' +
    '</div>';
}

function editAddr(id) {
  api.get('/addresses').then(function(res) {
    var addr = (res.data||[]).find(function(a){return a.id === id;});
    if (!addr) return;
    editingAddrId = id;
    document.getElementById('addrFormWrap').innerHTML =
      '<div class="profile-form" style="margin-top:12px;padding:16px;background:#f9fafb;border-radius:8px">' +
      '<div class="form-row"><div><label>联系电话</label><input type="text" id="addrPhone" value="' + escHtml(addr.phone||'') + '"></div><div><label>校区</label><select id="addrCampus">' + CAMPUSES.map(function(c){return '<option value="'+c.value+'"'+(c.value===addr.campus?' selected':'')+'>'+c.label+'</option>'}).join('') + '</select></div></div>' +
      '<div class="form-row"><div><label>楼栋</label><input type="text" id="addrBuilding" value="' + escHtml(addr.building||'') + '"></div><div><label>宿舍号</label><input type="text" id="addrDorm" value="' + escHtml(addr.dormNumber||'') + '"></div></div>' +
      '<div style="margin:8px 0"><label><input type="checkbox" id="addrDefault"' + (addr.isDefault?' checked':'') + '> 设为默认地址</label></div>' +
      '<button class="mall-btn mall-btn-primary" onclick="saveAddr()">更新地址</button>' +
      '</div>';
  });
}

function saveAddr() {
  var data = {
    phone: document.getElementById('addrPhone').value.trim(),
    campus: document.getElementById('addrCampus').value,
    building: document.getElementById('addrBuilding').value.trim(),
    dormNumber: document.getElementById('addrDorm').value.trim(),
    isDefault: document.getElementById('addrDefault').checked
  };
  if (!data.phone) { showToast('请输入联系电话', 'error'); return; }
  var promise = editingAddrId ? api.put('/addresses/' + editingAddrId, data) : api.post('/addresses', data);
  promise.then(function(res) {
    if (res.code === 200) { showToast(editingAddrId ? '更新成功' : '添加成功'); editingAddrId = null; document.getElementById('addrFormWrap').innerHTML = ''; loadAddresses(); }
    else { showToast(res.message || '操作失败', 'error'); }
  });
}

function deleteAddr(id) {
  if (!confirm('确定删除这个地址吗？')) return;
  api.delete('/addresses/' + id).then(function(res) {
    if (res.code === 200) { showToast('删除成功'); loadAddresses(); }
    else { showToast(res.message || '删除失败', 'error'); }
  });
}

// ========== 我的评价 ==========

function loadMyReviews() {
  api.get('/users/' + currentUser.id + '/reviews').then(function(res) {
    var el = document.getElementById('reviewsWrap');
    if (res.code !== 200) { el.innerHTML = '<div class="empty-state"><p>加载失败</p></div>'; return; }
    var data = res.data;
    var rate = (data.goodRate || 0).toFixed(1);
    var html = '<div style="background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;padding:20px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-around;text-align:center">' +
      '<div><div style="font-size:32px;font-weight:700">' + rate + '%</div><div style="font-size:12px;opacity:0.8">好评率</div></div>' +
      '<div><div style="font-size:32px;font-weight:700">' + (data.totalCount||0) + '</div><div style="font-size:12px;opacity:0.8">总评价</div></div>' +
      '</div>';
    if (!data.reviews || !data.reviews.length) { html += '<div class="empty-state"><p>暂无评价</p></div>'; }
    else {
      html += data.reviews.map(function(r) {
        var stars = '';
        for (var i=0; i<5; i++) stars += i < r.rating ? '★' : '☆';
        return '<div class="order-item"><div style="flex:1"><div>' + stars + ' <span style="color:#F59E0B;font-weight:600">' + r.rating + '分</span></div>' +
          (r.content ? '<div style="color:#374151;margin-top:4px">' + escHtml(r.content) + '</div>' : '') +
          '<div style="font-size:12px;color:#9ca3af;margin-top:4px">' + formatDate(r.createdAt) + '</div></div></div>';
      }).join('');
    }
    el.innerHTML = html;
  });
}

function escHtml(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
