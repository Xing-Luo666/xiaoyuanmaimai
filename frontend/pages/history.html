<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浏览历史 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.hist-wrap { max-width:900px; margin:16px auto 40px; padding:0 20px }
.page-title { font-size:22px;font-weight:700;color:#1f2937;margin-bottom:16px;display:flex;align-items:center;gap:8px }
.hist-card { background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden }
.hist-item { display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid #f1f5f9;gap:14px;cursor:pointer;transition:all .15s }
.hist-item:last-child { border-bottom:none }
.hist-item:hover { background:#f9fafb;transform:translateX(2px) }
.hist-item img { width:72px;height:72px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid #e5e7eb }
.hist-item .info { flex:1;min-width:0 }
.hist-item .title { font-weight:600;font-size:14px;color:#1f2937;margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
.hist-item .meta { color:#6b7280;font-size:12px;display:flex;align-items:center;gap:8px }
.hist-item .meta .time-icon { color:#9ca3af }
.hist-item .price { color:#ef4444;font-weight:700;font-size:16px;white-space:nowrap }
.hist-item .arrow { color:#9ca3af;font-size:18px;flex-shrink:0 }
.empty-state { text-align:center;padding:80px 20px }
.empty-state .empty-icon { font-size:64px;margin-bottom:12px;opacity:.7 }
.empty-state .empty-text { font-size:15px;color:#6b7280;margin-bottom:16px }
</style>
</head>
<body>
<div id="siteHeaderPlaceholder"></div>
<div class="hist-wrap">
  <div id="content" style="text-align:center;padding:80px"><p>⏳ 加载中...</p></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
(async function() {
  if (!await api.verifyAndInit()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  SiteHeader.render();
  var res = await api.getHistory();
  var list = res.data || [];
  if (list.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">🕐</div><div class="empty-text">暂无浏览记录</div><a href="products.html" class="mall-btn mall-btn-primary">去逛逛</a></div>';
    return;
  }
  var html = '<div class="page-title">🕐 最近浏览 <span style="font-size:14px;color:#6b7280;font-weight:400">('+list.length+'件)</span></div><div class="hist-card">';
  list.forEach(function(h) {
    html += '<div class="hist-item" onclick="location.href=\'product-detail.html?id='+h.productId+'\'">' +
      '<img src="'+(h.productImage||'/resources/default-product.gif')+'" onerror="this.src=\'/resources/default-product.gif\'">' +
      '<div class="info"><div class="title">'+escHtml(h.productTitle)+'</div><div class="meta"><span class="time-icon">👁</span><span>'+formatDate(h.viewedAt)+'</span></div></div>' +
      '<div class="price">¥'+Number(h.price).toFixed(2)+'</div>' +
      '<span class="arrow">›</span>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
})();
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
