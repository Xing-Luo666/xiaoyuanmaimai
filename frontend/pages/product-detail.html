<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品详情 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.spec-option { padding:8px 16px; border:1px solid #d1d5db; border-radius:8px; cursor:pointer; text-align:center; font-size:13px; transition:all .2s; min-width:80px }
.spec-option:hover { border-color:#2563eb; background:#eff6ff }
.spec-option.active { border-color:#2563eb; background:#eff6ff; color:#2563eb; font-weight:600 }
.quantity-row { display:flex; align-items:center; gap:8px; margin-top:12px }
.qty-btn { width:32px; height:32px; border:1px solid #d1d5db; border-radius:6px; background:#fff; cursor:pointer; font-size:16px; display:flex; align-items:center; justify-content:center }
.qty-btn:hover { background:#f3f4f6 }
.qty-input { width:50px; text-align:center; border:1px solid #d1d5db; border-radius:6px; padding:4px; font-size:14px }
.btn-cart { background:#22c55e; color:#fff; padding:12px 24px; border-radius:24px; border:none; font-size:15px; cursor:pointer; margin-right:8px }
.btn-cart:hover { background:#16a34a }
.btn-fav { background:none; border:2px solid #ef4444; color:#ef4444; border-radius:50%; width:44px; height:44px; font-size:20px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center }
.btn-fav.active { background:#ef4444; color:#fff }
.btn-contact-seller { background:#6366f1; color:#fff; padding:10px 20px; border-radius:24px; border:none; font-size:14px; cursor:pointer; margin-top:8px; display:block; width:100% }
.btn-contact-seller:hover { background:#4f46e5 }
/* 地址选择弹窗 */
.addr-modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center }
.addr-modal { background:#fff; border-radius:12px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; padding:24px }
.addr-modal h3 { margin:0 0 16px 0; font-size:18px }
.addr-option { display:flex; align-items:center; padding:12px; border:1px solid #e5e7eb; border-radius:8px; cursor:pointer; margin-bottom:8px; transition:all .2s }
.addr-option:hover { border-color:#2563eb }
.addr-option.selected { border-color:#2563eb; background:#eff6ff }
.addr-option input[type=radio] { margin-right:12px }
.addr-option .addr-info { flex:1 }
.addr-option .addr-info .addr-name { font-weight:600; font-size:14px }
.addr-option .addr-info .addr-detail { font-size:12px; color:#6b7280; margin-top:2px }
.addr-quick-form { background:#f9fafb; border-radius:8px; padding:16px; margin-top:12px }
.addr-quick-form .form-row { display:flex; gap:8px; margin-bottom:8px }
.addr-quick-form .form-row input, .addr-quick-form .form-row select { flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px }
.addr-modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end }
.img-gallery .img-thumbs { display:flex; gap:8px; margin-top:8px; overflow-x:auto }
.img-gallery .img-thumb { width:60px; height:60px; object-fit:cover; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all .2s }
.img-gallery .img-thumb:hover { border-color:#93c5fd }
.img-gallery .img-thumb.active { border-color:#2563eb }
.seller-products { margin-top:16px }
.seller-products h3 { font-size:16px; margin-bottom:12px; color:#1f2937 }
.seller-products .sp-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:12px }
.seller-products .sp-card { background:#fff; border:1px solid #e5e7eb; border-radius:8px; overflow:hidden; cursor:pointer; transition:all .2s }
.seller-products .sp-card:hover { box-shadow:0 2px 12px rgba(0,0,0,.08); transform:translateY(-2px) }
.seller-products .sp-card img { width:100%; height:100px; object-fit:cover }
.seller-products .sp-card .sp-info { padding:8px }
.seller-products .sp-card .sp-title { font-size:12px; color:#374151; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.seller-products .sp-card .sp-price { font-size:14px; color:#ef4444; font-weight:600; margin-top:4px }
@media (max-width: 768px) {
  .detail-layout { grid-template-columns: 1fr !important; }
}
</style>
</head>
<body>

<div id="siteHeaderPlaceholder"></div>
    <div class="detail-wrap" style="max-width:1200px;margin:16px auto 40px;padding:0 20px">
  <div id="detailContent" style="text-align:center;padding:80px;"><p>⏳ 加载中...</p></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
var currentProduct = null;
var selectedSpec = null;
var quantity = 1;
var isFavorited = false;

(async function() {
  await api.verifyAndInit();
  SiteHeader.render();
  var id = new URLSearchParams(location.search).get('id');
  if (!id) { showError('参数错误'); return; }

  var res = await api.get('/products/' + id);
  if (res.code !== 200) { showError('商品不存在或已下架'); return; }
  currentProduct = res.data;

  // 记录历史
  if (api.isLoggedIn()) {
    api.addHistory({ productId: currentProduct.id, productTitle: currentProduct.title, productImage: (currentProduct.images||[])[0]||'', price: currentProduct.price });
  }

  // 检查收藏状态
  if (api.isLoggedIn()) {
    var favRes = await api.checkFavorites([currentProduct.id]);
    isFavorited = favRes.data && favRes.data[currentProduct.id];
  }

  renderDetail();
})();

function showError(msg) {
  document.getElementById('detailContent').innerHTML = '<div style="text-align:center;padding:80px"><p style="font-size:48px">⚠️</p><p>'+msg+'</p></div>';
}

function renderDetail() {
  var p = currentProduct;
  var imgs = p.images && p.images.length ? p.images : ['/resources/default-product.gif'];
  var specs = p.specs || [];
  var user = api.getUser();
  var isOwner = user && user.userId === p.sellerId;

  // 默认价格
  var displayPrice = p.price;
  if (selectedSpec) { displayPrice = selectedSpec.price; }

  var specHTML = '';
  if (specs.length > 0) {
    specHTML = '<div style="margin:12px 0"><label class="form-label">选择规格</label><div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px">';
    specs.forEach(function(s) {
      var stockText = s.stock === -1 ? '<br><span style="font-size:11px;color:#22c55e">无限库存</span>' : (s.stock > 0 ? '<br><span style="font-size:11px;color:#9ca3af">库存:'+s.stock+'</span>' : '<br><span style="font-size:11px;color:#ef4444">无货</span>');
      specHTML += '<div class="spec-option'+(selectedSpec && selectedSpec.id===s.id?' active':'')+'" onclick="selectSpec(\''+s.id+'\')" data-sid="'+s.id+'">'+escHtml(s.name)+'<br><span style="font-size:12px;color:#ef4444">¥'+s.price.toFixed(2)+'</span>'+(s.oriPrice>s.price?' <span style="font-size:11px;color:#9ca3af;text-decoration:line-through">¥'+s.oriPrice.toFixed(2)+'</span>':'')+stockText+'</div>';
    });
    specHTML += '</div></div>';
  }

  var qtyHTML = '<div class="quantity-row"><label class="form-label" style="margin:0">数量:</label><button class="qty-btn" onclick="changeQty(-1)">-</button><input class="qty-input" id="qtyInput" value="'+quantity+'" onchange="quantity=Math.max(1,parseInt(this.value)||1);this.value=quantity"><button class="qty-btn" onclick="changeQty(1)">+</button></div>';

  var actionHTML = '';
  if (!user) {
    actionHTML = '<button class="btn-buy-now" onclick="location.href=\'login.html?redirect=\'+encodeURIComponent(location.href)">登录后购买</button>';
  } else if (isOwner) {
    if (p.status === 'selling') {
      actionHTML = '<span style="display:block;padding:14px;background:#F5F5F5;border-radius:24px;text-align:center;color:#999;margin-bottom:8px">这是你的商品</span>';
    } else {
      actionHTML = '<span style="display:block;padding:14px;background:#F5F5F5;border-radius:24px;text-align:center;color:#999;margin-bottom:8px">状态: '+p.status+'</span>';
    }
  } else if (p.status === 'selling') {
    actionHTML = '<button class="btn-buy-now" onclick="buyNow()">立即购买</button>' +
      '<button class="btn-cart" onclick="addToCart()">加入购物车</button>' +
      '<button class="btn-fav'+(isFavorited?' active':'')+'" onclick="toggleFav()" id="favBtn">'+ (isFavorited?'♥':'♡') +'</button>';
  } else {
    actionHTML = '<span style="display:block;padding:14px;background:#F5F5F5;border-radius:24px;text-align:center;color:#999">'+p.status+'</span>';
  }

  // 非卖家登录后可以联系卖家
  if (user && !isOwner) {
    actionHTML += '<button class="btn-contact-seller" onclick="contactSeller(\''+p.sellerId+'\',\''+escHtmlAttr(p.sellerName||'')+'\')">💬 联系卖家</button>';
  }

  // 多图轮播HTML
  var galleryHTML = '';
  if (imgs.length === 1) {
    galleryHTML = '<img src="'+imgs[0]+'" style="width:100%;border-radius:12px" alt="'+escHtml(p.title)+'">';
  } else {
    galleryHTML = '<div class="img-gallery">' +
      '<img src="'+imgs[0]+'" id="mainImg" style="width:100%;border-radius:12px;cursor:pointer" alt="'+escHtml(p.title)+'">' +
      '<div class="img-thumbs">' + imgs.map(function(src, i) {
        return '<img src="'+src+'" class="img-thumb'+(i===0?' active':'')+'" onclick="switchImg(this,\''+src+'\')" data-idx="'+i+'">';
      }).join('') + '</div></div>';
  }

  document.getElementById('detailContent').innerHTML =
    '<div class="detail-layout" style="display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:24px;align-items:start">' +
    '<div class="detail-gallery" style="min-width:0">'+galleryHTML+'</div>' +
    '<div class="detail-info" style="min-width:0">' +
    '<h2 style="margin-bottom:8px;font-size:20px;line-height:1.4">'+escHtml(p.title)+'</h2>' +
    '<div class="detail-price-box" style="background:linear-gradient(135deg,#fff7ed,#fef2f2);border-radius:12px;padding:16px;margin:12px 0"><div style="font-size:30px;color:#ef4444;font-weight:700">¥'+displayPrice.toFixed(2)+' '+(p.oriPrice>displayPrice?'<span style="font-size:16px;color:#9ca3af;text-decoration:line-through;margin-left:8px">¥'+p.oriPrice.toFixed(2)+'</span>':'')+'</div>'+(p.oriPrice>displayPrice?'<div style="font-size:12px;color:#ef4444;margin-top:4px">比原价省 ¥'+(p.oriPrice-displayPrice).toFixed(2)+'</div>':'')+'</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:8px;margin:12px 0">' +
      '<span style="background:#eff6ff;color:#2563eb;padding:4px 10px;border-radius:12px;font-size:12px">'+getCategoryLabel(p.category)+'</span>' +
      '<span style="background:#f0fdf4;color:#16a34a;padding:4px 10px;border-radius:12px;font-size:12px">'+getCampusLabel(p.campus)+'</span>' +
      (p.building?'<span style="background:#faf5ff;color:#9333ea;padding:4px 10px;border-radius:12px;font-size:12px">'+p.building+'栋</span>':'') +
      '<span style="background:#fff7ed;color:#ea580c;padding:4px 10px;border-radius:12px;font-size:12px">'+getConditionLabel(p.condition)+'</span>' +
    '</div>' +
    '<div style="color:#9ca3af;font-size:12px;margin:8px 0;display:flex;gap:16px"><span>👁 浏览 '+p.viewCount+'</span><span>📦 '+getStockText(specs)+'</span></div>' +
    specHTML + qtyHTML +
    '<div class="detail-desc" style="margin:16px 0;line-height:1.7;color:#374151;background:#f9fafb;border-radius:8px;padding:14px">'+escHtml(p.description||'暂无描述')+'</div>' +
    '<div style="background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-radius:8px;padding:12px;margin:12px 0;display:flex;align-items:center;gap:12px"><div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#3B82F6,#2563EB);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px">'+(p.sellerName?p.sellerName[0].toUpperCase():'U')+'</div><div><div style="font-weight:600;color:#1f2937">'+escHtml(p.sellerName||'匿名卖家')+'</div><div style="font-size:11px;color:#6b7280">卖家信誉良好</div></div></div>' +
    '<div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">'+actionHTML+'</div>' +
    '</div></div>' +
    '<div id="sellerProducts" style="margin-top:24px"></div>';
  // 加载卖家其他商品
  loadSellerProducts(p.sellerId, p.id);
}

function selectSpec(sid) {
  var spec = (currentProduct.specs||[]).find(function(s){ return s.id===sid; });
  if (!spec || spec.stock === 0) { showToast('该规格无库存', 'error'); return; }
  selectedSpec = spec;
  quantity = 1;
  renderDetail();
}

function switchImg(thumbEl, src) {
  var mainImg = document.getElementById('mainImg');
  if (mainImg) mainImg.src = src;
  document.querySelectorAll('.img-thumb').forEach(function(t){ t.classList.remove('active'); });
  thumbEl.classList.add('active');
}

async function loadSellerProducts(sellerId, currentId) {
  var container = document.getElementById('sellerProducts');
  if (!container) return;
  try {
    var res = await api.get('/products', { sellerId: sellerId, status: 'selling', pageSize: 6 });
    if (res.code !== 200 || !res.data || !res.data.list) { container.innerHTML = ''; return; }
    var others = res.data.list.filter(function(p){ return p.id !== currentId; }).slice(0, 4);
    if (others.length === 0) { container.innerHTML = ''; return; }
    var html = '<div class="seller-products"><h3>卖家其他商品</h3><div class="sp-grid">';
    others.forEach(function(p) {
      var img = (p.images && p.images.length) ? p.images[0] : '/resources/default-product.gif';
      html += '<div class="sp-card" onclick="location.href=\'product-detail.html?id='+p.id+'\'">' +
        '<img src="'+img+'" alt="'+escHtml(p.title)+'">' +
        '<div class="sp-info"><div class="sp-title">'+escHtml(p.title)+'</div>' +
        '<div class="sp-price">¥'+Number(p.price).toFixed(2)+'</div></div></div>';
    });
    html += '</div></div>';
    container.innerHTML = html;
  } catch(e) { container.innerHTML = ''; }
}

function changeQty(delta) {
  quantity = Math.max(1, quantity + delta);
  var maxStock = selectedSpec ? (selectedSpec.stock === -1 ? 999 : selectedSpec.stock) : 999;
  quantity = Math.min(quantity, maxStock);
  document.getElementById('qtyInput').value = quantity;
}

var selectedAddressId = null;

async function buyNow() {
  if (currentProduct.specs && currentProduct.specs.length > 0 && !selectedSpec) { showToast('请选择规格', 'error'); return; }
  // 加载地址列表并弹窗
  var addrRes = await api.get('/addresses');
  var addresses = addrRes.data || [];
  showAddressModal(addresses);
}

function showAddressModal(addresses) {
  var html = '<div class="addr-modal-overlay" id="addrModalOverlay" onclick="if(event.target===this)closeAddressModal()">';
  html += '<div class="addr-modal"><h3>选择收货地址</h3>';

  if (addresses.length > 0) {
    addresses.forEach(function(a) {
      var def = a.isDefault ? ' <span style="color:#22c55e;font-size:11px;font-weight:600">默认</span>' : '';
      html += '<label class="addr-option' + (a.isDefault && !selectedAddressId ? ' selected' : '') + '" onclick="selectAddrOption(this,\'' + a.id + '\')">';
      html += '<input type="radio" name="addrRadio" value="' + a.id + '"' + (a.isDefault && !selectedAddressId ? ' checked' : '') + '>';
      html += '<div class="addr-info"><div class="addr-name">' + escHtml(a.campus||'') + (a.building ? ' ' + escHtml(a.building) + '栋' : '') + (a.dormNumber ? ' ' + escHtml(a.dormNumber) : '') + def + '</div>';
      html += '<div class="addr-detail">' + escHtml(a.phone||'无电话') + '</div></div></label>';
      if (a.isDefault && !selectedAddressId) selectedAddressId = a.id;
    });
    html += '<button class="addr-quick-form" style="width:100%;text-align:center;background:#fff;cursor:pointer;color:#6b7280;border:1px dashed #d1d5db" onclick="showQuickAddrForm()">+ 添加新地址</button>';
    html += '<div id="quickAddrFormWrap"></div>';
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddressModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="confirmBuyWithAddr()">确认下单</button></div>';
  } else {
    html += '<p style="color:#6b7280;margin-bottom:12px">您还没有收货地址，请先添加：</p>';
    html += renderQuickAddrForm();
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddressModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="confirmBuyWithAddr()">保存并下单</button></div>';
  }

  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  if (!selectedAddressId && addresses.length > 0) {
    var def = addresses.find(function(a){return a.isDefault;});
    if (def) {
      selectedAddressId = def.id;
    } else {
      // 没有默认地址时，自动选中第一个
      selectedAddressId = addresses[0].id;
      var firstOption = document.querySelector('.addr-option');
      if (firstOption) {
        firstOption.classList.add('selected');
        var radio = firstOption.querySelector('input[type=radio]');
        if (radio) radio.checked = true;
      }
    }
  }
}

function selectAddrOption(el, id) {
  selectedAddressId = id;
  document.querySelectorAll('.addr-option').forEach(function(o){o.classList.remove('selected');});
  el.classList.add('selected');
  el.querySelector('input[type=radio]').checked = true;
}

function closeAddressModal() {
  var overlay = document.getElementById('addrModalOverlay');
  if (overlay) overlay.remove();
}

function showQuickAddrForm() {
  document.getElementById('quickAddrFormWrap').innerHTML = renderQuickAddrForm();
}

function renderQuickAddrForm() {
  return '<div class="addr-quick-form">' +
    '<div class="form-row"><input type="text" id="addrPhone" placeholder="手机号"></div>' +
    '<div class="form-row"><select id="addrCampus">' + CAMPUSES.map(function(c){return '<option value="'+c.value+'">'+c.label+'</option>'}).join('') + '</select></div>' +
    '<div class="form-row"><input type="text" id="addrBuilding" placeholder="楼栋（如: 5号楼）"><input type="text" id="addrDorm" placeholder="宿舍号（如: 302）"></div>' +
    '</div>';
}

async function confirmBuyWithAddr() {
  // 如果有快速表单，先保存地址
  var phoneEl = document.getElementById('addrPhone');
  if (phoneEl && phoneEl.value.trim()) {
    var data = {
      phone: phoneEl.value.trim(),
      campus: document.getElementById('addrCampus') ? document.getElementById('addrCampus').value : '',
      building: document.getElementById('addrBuilding') ? document.getElementById('addrBuilding').value.trim() : '',
      dormNumber: document.getElementById('addrDorm') ? document.getElementById('addrDorm').value.trim() : ''
    };
    if (!data.phone) { showToast('请输入联系电话', 'error'); return; }
    var addrRes = await api.post('/addresses', data);
    if (addrRes.code === 200) {
      selectedAddressId = addrRes.data ? addrRes.data.id : '';
    } else {
      showToast(addrRes.message || '添加地址失败', 'error');
      return;
    }
  }

  if (!selectedAddressId) { showToast('请选择收货地址', 'error'); return; }

  closeAddressModal();
  var price = selectedSpec ? selectedSpec.price : currentProduct.price;
  var res = await api.post('/orders', { productId: currentProduct.id, price: price, quantity: quantity, spec: selectedSpec?selectedSpec.name:'', addressId: selectedAddressId });
  if (res.code === 200) { showToast('下单成功！'); setTimeout(function(){ location.href='orders.html'; }, 800); }
  else { showToast(res.message || '购买失败', 'error'); }
}

async function addToCart() {
  if (currentProduct.specs && currentProduct.specs.length > 0 && !selectedSpec) { showToast('请选择规格', 'error'); return; }
  var price = selectedSpec ? selectedSpec.price : currentProduct.price;
  var res = await api.addToCart({
    productId: currentProduct.id,
    productTitle: currentProduct.title,
    productImage: (currentProduct.images||[])[0]||'',
    specName: selectedSpec ? selectedSpec.name : '',
    price: price,
    quantity: quantity
  });
  if (res.code === 200) { showToast('已加入购物车'); }
  else { showToast(res.message || '添加失败', 'error'); }
}

async function toggleFav() {
  if (!api.isLoggedIn()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  var res = await api.toggleFavorite({ productId: currentProduct.id, productTitle: currentProduct.title, productImage: (currentProduct.images||[])[0]||'', price: currentProduct.price });
  if (res.code === 200) {
    isFavorited = res.data.favorited;
    document.getElementById('favBtn').textContent = isFavorited ? '♥' : '♡';
    document.getElementById('favBtn').classList.toggle('active', isFavorited);
    showToast(isFavorited ? '已收藏' : '已取消收藏');
  }
}

function getCategoryLabel(v) { var c = CATEGORIES.find(function(x){return x.value===v}); return c?c.label:v; }
function getCampusLabel(v) { var c = CAMPUSES.find(function(x){return x.value===v}); return c?c.label:v; }
function getConditionLabel(v) { var c = CONDITIONS.find(function(x){return x.value===v}); return c?c.label:v; }
function getStockText(specs) {
  if (!specs || specs.length === 0) return '现货';
  var hasZero = specs.some(function(s){ return s.stock === 0; });
  if (specs.every(function(s){ return s.stock === 0; })) return '已售罄';
  if (specs.every(function(s){ return s.stock === -1; })) return '现货充足';
  var total = specs.reduce(function(a,s){ return a + (s.stock>0?s.stock:0); }, 0);
  return '库存 ' + total + ' 件';
}
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escHtmlAttr(s) { return String(s||'').replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

async function contactSeller(sellerId, sellerName) {
  var res = await api.post('/chat/init', { peerId: sellerId, peerName: sellerName });
  if (res.code !== 200) { showToast('发起聊天失败: '+(res.message||'未知错误'), 'error'); return; }
  location.href = 'chat.html?peer_key=' + encodeURIComponent(res.data.peerKey) + '&peer_name=' + encodeURIComponent(res.data.peerName) + '&from=detail&id=' + encodeURIComponent(currentProduct.id);
}
</script>
</body>
