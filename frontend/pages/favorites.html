<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的收藏 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
</head>
<body>
<div class="top-nav"><div class="top-nav-inner"><span>欢迎来到校园二手交易平台！</span><div id="topNavRight"><a href="login.html">请登录</a><a href="register.html">免费注册</a></div></div></div>
<header class="main-header" style="box-shadow:none;border-bottom:1px solid #e5e7eb"><div class="header-inner"><div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer"><div class="logo-icon">📚</div><div><div class="logo-text">校园二手</div><div class="logo-sub">闲置交易平台</div></div></div><a href="javascript:history.back()" style="font-size:22px;color:#1f2937;text-decoration:none;margin-left:auto">← 返回</a></div></header>
<div class="publish-wrap" style="margin-top:16px">
  <div id="content" style="text-align:center;padding:80px"><p>⏳ 加载中...</p></div>
</div>

<script src="../js/api.js"></script>
<script>
(async function() {
  if (!await api.verifyAndInit()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  updateNav();
  var res = await api.getFavorites();
  var list = res.data || [];
  if (list.length === 0) {
    document.getElementById('content').innerHTML = '<div style="padding:80px;text-align:center"><p style="font-size:48px">♥</p><p>还没有收藏的商品</p><a href="products.html" class="mall-btn mall-btn-primary" style="margin-top:16px">去逛逛</a></div>';
    return;
  }
  var html = '<div class="publish-card"><h2>收藏列表 ('+list.length+')</h2>';
  list.forEach(function(f) {
    html += '<div style="display:flex;align-items:center;padding:12px 0;border-bottom:1px solid #f1f5f9;gap:12px;cursor:pointer" onclick="location.href=\'product-detail.html?id='+f.productId+'\'">' +
      '<img src="'+(f.productImage||'/resources/default-product.gif')+'" style="width:48px;height:48px;border-radius:8px;object-fit:cover" onerror="this.src=\'/resources/default-product.gif\'">' +
      '<div style="flex:1"><div style="font-weight:600">'+escHtml(f.productTitle)+'</div><div style="color:#6b7280;font-size:12px">'+formatDate(f.createdAt)+'</div></div>' +
      '<div style="color:#ef4444;font-weight:700">¥'+Number(f.price).toFixed(2)+'</div>' +
      '</div>';
  });
  html += '</div>';
  document.getElementById('content').innerHTML = html;
})();
function updateNav() {
  var user = api.getUser();
  if (!user) return;
  document.getElementById('topNavRight').innerHTML =
    '<span>Hi, <b>' + escHtml(user.username) + '</b></span>' +
    '<a href="../index.html">首页</a>' +
    '<a href="orders.html">我的订单</a>' +
    '<a href="profile.html">个人中心</a>' +
    '<a href="javascript:void(0)" onclick="api.logout()">退出</a>';
}
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
