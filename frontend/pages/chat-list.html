<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消息 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
  body { background: #f5f5f5; margin: 0; padding: 0; }
  .chat-list-wrap { max-width: 600px; margin: 0 auto; padding:16px 20px 40px }
  .chat-list-title { font-size:22px;font-weight:700;color:#1f2937;margin-bottom:16px;padding:0 4px }
  .conv-item { 
    display: flex; align-items: center; gap: 12px; padding: 14px 16px; 
    border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .15s;
  }
  .conv-item:hover { background: #f8f9fa; }
  .conv-avatar { 
    width: 48px; height: 48px; border-radius: 50%; 
    background: linear-gradient(135deg, #3B82F6, #2563EB); color: #fff;
    display: flex; align-items: center; justify-content: center; 
    font-size: 18px; font-weight: 700; flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-top { display: flex; justify-content: space-between; align-items: baseline; }
  .conv-name { font-size: 16px; font-weight: 500; color: #1f2937; }
  .conv-time { font-size: 12px; color: #9ca3af; }
  .conv-last { font-size: 13px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
  .conv-badge { 
    min-width: 20px; height: 20px; line-height: 20px; text-align: center;
    background: #ef4444; color: #fff; border-radius: 10px; font-size: 11px; 
    padding: 0 6px; margin-top: 4px; flex-shrink: 0;
  }
  .conv-empty { text-align: center; padding: 80px 20px; color: #9ca3af; }
  .conv-empty-icon { font-size: 64px; margin-bottom: 16px; }
  .conv-empty-text { font-size: 15px; }
</style>
</head>
<body>
<!-- 主页面顶部栏 -->
<div id="siteHeaderPlaceholder"></div>

<div class="chat-list-wrap">
  <div class="chat-list-title">💬 消息</div>
  <div id="convList"></div>
  <div class="conv-empty" id="convEmpty" style="display:none">
    <div class="conv-empty-icon">💬</div>
    <div class="conv-empty-text">暂无消息</div>
    <div style="margin-top:8px;font-size:13px;color:#b0b7c3">完成一笔订单后即可与对方聊天</div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
(async function() {
  if (!await api.verifyAndInit()) { location.href = 'login.html'; return; }
  SiteHeader.render();

  window.loadConvList = function() {
    api.get('/chat-list').then(function(res) {
      var list = document.getElementById('convList');
      if (!res.data || res.data.length === 0) {
        list.innerHTML = '';
        document.getElementById('convEmpty').style.display = '';
        return;
      }
      document.getElementById('convEmpty').style.display = 'none';
      list.innerHTML = res.data.map(function(c) {
        var badgeHtml = c.unreadCount > 0
          ? '<span class="conv-badge">' + (c.unreadCount > 99 ? '99+' : c.unreadCount) + '</span>'
          : '';
        var timeStr = formatTime(c.lastTime);
        var initial = (c.peerName || '?')[0].toUpperCase();
        var avatarHTML;
        if (c.peerAvatar) {
          var url = c.peerAvatar;
          if (url.indexOf('http') !== 0 && url.indexOf('/') !== 0) url = '/' + url;
          avatarHTML = '<img src="' + escHtml(url) + '" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.style.display=\'none\';this.parentElement.textContent=\'' + initial + '\'">';
        } else {
          avatarHTML = initial;
        }
        return '<div class="conv-item" onclick="openChat(\'' + c.peerKey + '\', \'' + escHtml(c.peerName || '用户') + '\')">' +
          '<div class="conv-avatar">' + avatarHTML + '</div>' +
          '<div class="conv-info">' +
            '<div class="conv-top"><span class="conv-name">' + escHtml(c.peerName || '用户') + '</span><span class="conv-time">' + timeStr + '</span></div>' +
            '<div class="conv-last">' + escHtml(c.lastMsg) + '</div>' +
          '</div>' +
          badgeHtml +
        '</div>';
      }).join('');
    });
  };

  loadConvList();

  window.openChat = function(peerKey, peerName) {
    // 标记已读
    api.post('/chat-read?peer_key=' + encodeURIComponent(peerKey));
    // 直接进入对话（无需订单）
    location.href = 'chat.html?peer_key=' + encodeURIComponent(peerKey) + '&peer_name=' + encodeURIComponent(peerName || '用户') + '&from=list';
  };

  function formatTime(t) {
    if (!t) return '';
    var d = new Date(t);
    var now = new Date();
    var isToday = d.toDateString() === now.toDateString();
    var h = ('0' + d.getHours()).slice(-2);
    var m = ('0' + d.getMinutes()).slice(-2);
    if (isToday) return h + ':' + m;
    var year = d.getFullYear();
    var month = ('0' + (d.getMonth() + 1)).slice(-2);
    var day = ('0' + d.getDate()).slice(-2);
    if (year === now.getFullYear()) return month + '/' + day;
    return year + '/' + month + '/' + day;
  }

  function escHtml(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
})();
</script>
</body>
</html>
