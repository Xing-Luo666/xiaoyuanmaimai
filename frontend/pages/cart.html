<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物车 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.cart-item { display:flex; align-items:center; padding:16px; border-bottom:1px solid #f1f5f9; gap:12px; transition:background .15s;border-radius:8px }
.cart-item:hover { background:#f9fafb }
.cart-item img { width:72px; height:72px; border-radius:8px; object-fit:cover; flex-shrink:0; border:1px solid #e5e7eb }
.cart-item .info { flex:1; min-width:0 }
.cart-item .info .title { font-weight:600; font-size:14px; margin-bottom:4px;color:#1f2937 }
.cart-item .info .spec { color:#6b7280; font-size:12px;background:#f3f4f6;padding:2px 8px;border-radius:10px;display:inline-block }
.cart-item .info .qty { color:#6b7280; font-size:12px;margin-top:4px }
.cart-item .price { color:#ef4444; font-weight:700; font-size:16px; white-space:nowrap }
.cart-item .del-btn { color:#9ca3af;background:none;border:none;cursor:pointer;font-size:12px;padding:6px 10px;border-radius:6px;transition:all .15s }
.cart-item .del-btn:hover { color:#ef4444;background:#fef2f2 }
.cart-item-disabled { opacity:.55;filter:grayscale(.4) }
.cart-item-disabled img { filter:grayscale(.6) }
.sold-out-tag { display:inline-block;background:#fee2e2;color:#dc2626;font-size:11px;padding:1px 8px;border-radius:10px;margin-left:6px;vertical-align:middle;font-weight:600 }
.cart-wrap-title { font-size:22px;font-weight:700;color:#1f2937;margin-bottom:16px;display:flex;align-items:center;gap:8px }
.summary { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:20px; margin-top:16px;box-shadow:0 1px 3px rgba(0,0,0,.04) }
.summary .total { font-size:22px; font-weight:700; color:#ef4444 }
.summary-label { font-size:12px;color:#6b7280;margin-bottom:4px }
.btn-primary { background:#2563eb;color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:all .15s }
.btn-primary:hover { background:#1d4ed8 }
.btn-outline { background:#fff;color:#374151;border:1px solid #d1d5db;padding:10px 20px;border-radius:8px;cursor:pointer;font-size:14px;transition:all .15s }
.btn-outline:hover { background:#f9fafb;border-color:#9ca3af }
/* 地址选择弹窗 */
.addr-modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center }
.addr-modal { background:#fff; border-radius:12px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; padding:24px }
.addr-modal h3 { margin:0 0 16px 0; font-size:18px }
.addr-option { display:flex; align-items:center; padding:12px; border:1px solid #e5e7eb; border-radius:8px; cursor:pointer; margin-bottom:8px; transition:all .2s }
.addr-option:hover { border-color:#2563eb }
.addr-option.selected { border-color:#2563eb; background:#eff6ff }
.addr-option input[type=radio] { margin-right:12px }
.addr-option .addr-info { flex:1 }
.addr-option .addr-info .addr-name { font-weight:600; font-size:14px }
.addr-option .addr-info .addr-detail { font-size:12px; color:#6b7280; margin-top:2px }
.addr-quick-form { background:#f9fafb; border-radius:8px; padding:16px; margin-top:12px }
.addr-quick-form .form-row { display:flex; gap:8px; margin-bottom:8px }
.addr-quick-form .form-row input { flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px }
.addr-modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end }
.empty-state { text-align:center;padding:80px 20px }
.empty-state .empty-icon { font-size:64px;margin-bottom:12px;opacity:.7 }
.empty-state .empty-text { font-size:15px;color:#6b7280;margin-bottom:16px }
</style>
</head>
<body>
<div id="siteHeaderPlaceholder"></div>
<div class="cart-wrap" style="max-width:1000px;margin:16px auto 40px;padding:0 20px">
  <div id="content" style="text-align:center;padding:80px"><p>⏳ 加载中...</p></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
(async function() {
  if (!await api.verifyAndInit()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  SiteHeader.render();
  loadCart();
})();

var cartItems = [];
var selectedIds = {};

async function loadCart() {
  var res = await api.getCart();
  if (res.code !== 200) { document.getElementById('content').innerHTML = '<p>加载失败</p>'; return; }
  cartItems = res.data || [];
  if (cartItems.length === 0) {
    document.getElementById('content').innerHTML = '<div class="empty-state"><div class="empty-icon">🛒</div><div class="empty-text">购物车空空如也</div><a href="products.html" class="mall-btn mall-btn-primary">去逛逛</a></div>';
    return;
  }
  renderCart();
}

function renderCart() {
  var html = '<div class="cart-wrap-title">🛒 购物清单</div><div class="publish-card" style="padding:8px 16px">';
  var totalPrice = 0;
  // 仅"可购买"项参与全选判断
  var availableItems = cartItems.filter(function(it){ return isItemAvailable(it); });
  var allChecked = availableItems.length > 0 && availableItems.every(function(it){ return selectedIds[it.id]; });
  cartItems.forEach(function(item, i) {
    var available = isItemAvailable(item);
    var checked = selectedIds[item.id] ? 'checked' : '';
    if (!checked && available) allChecked = false;
    if (checked) totalPrice += item.price * item.quantity;

    var soldOutTag = '';
    var itemClass = 'cart-item';
    var checkboxAttr = 'onchange="toggleSelect(\''+item.id+'\')"';
    if (!available) {
      // 已售罄/下架：禁用勾选，置灰显示
      itemClass = 'cart-item cart-item-disabled';
      checkboxAttr = 'disabled';
      // 区分 sold_out 和 hidden（下架）
      var tagText = item.productStatus === 'sold_out' ? '已售罄' : '已下架';
      soldOutTag = '<span class="sold-out-tag">' + tagText + '</span>';
    }

    html += '<div class="' + itemClass + '">' +
      '<input type="checkbox" '+checked+' '+checkboxAttr+' style="width:18px;height:18px;flex-shrink:0">' +
      '<img src="'+(item.productImage||'/resources/default-product.gif')+'" onerror="this.src=\'/resources/default-product.gif\'">' +
      '<div class="info"><div class="title">'+escHtml(item.productTitle)+' '+soldOutTag+'</div>'+(item.specName?'<div class="spec">'+escHtml(item.specName)+'</div>':'')+'<div class="qty">数量: '+item.quantity+'</div></div>' +
      '<div class="price">¥'+(item.price * item.quantity).toFixed(2)+'</div>' +
      '<button class="del-btn" onclick="removeItem(\''+item.id+'\')">删除</button>' +
      '</div>';
  });
  html += '</div>';

  var summary = '<div class="summary"><div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">' +
    '<div style="display:flex;align-items:center;gap:16px"><label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:14px"><input type="checkbox" '+(allChecked?'checked':'')+' onchange="toggleSelectAll(this)" style="width:18px;height:18px">全选</label><span style="color:#6b7280;font-size:14px">已选 <b style="color:#1f2937">'+Object.keys(selectedIds).length+'</b> 件</span></div>' +
    '<div style="display:flex;align-items:center;gap:20px"><div><div class="summary-label">合计</div><div class="total">¥'+totalPrice.toFixed(2)+'</div></div>' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn-outline" onclick="batchDelete()">批量删除</button>' +
    '<button class="btn-primary" onclick="batchBuy()">一键购买</button>' +
    '</div></div></div></div>';

  document.getElementById('content').innerHTML = html + summary;
}

// 判断购物车项是否可购买：商品状态必须是 selling
function isItemAvailable(item) {
  return item.productStatus === 'selling' || !item.productStatus;
}

function toggleSelectAll(checkbox) {
  if (checkbox.checked) {
    // 仅选中可购买的项，跳过已售罄项
    cartItems.forEach(function(item) { if (isItemAvailable(item)) selectedIds[item.id] = true; });
  } else {
    selectedIds = {};
  }
  renderCart();
}

function toggleSelect(id) {
  if (selectedIds[id]) { delete selectedIds[id]; } else { selectedIds[id] = true; }
  renderCart();
}

async function removeItem(id) {
  await api.removeCartItems(id);
  loadCart();
}

async function batchDelete() {
  var ids = Object.keys(selectedIds);
  if (ids.length === 0) { showToast('请先选择商品', 'warning'); return; }
  await api.removeCartItems(ids);
  selectedIds = {};
  loadCart();
}

var selectedAddressId = null;

async function batchBuy() {
  var ids = Object.keys(selectedIds);
  if (ids.length === 0) { showToast('请先选择商品', 'warning'); return; }
  // 加载地址列表并弹窗
  var addrRes = await api.get('/addresses');
  showAddressModal(addrRes.data || [], ids);
}

function showAddressModal(addresses, ids) {
  selectedAddressId = null;
  var html = '<div class="addr-modal-overlay" id="addrModalOverlay" onclick="if(event.target===this)closeAddressModal()">';
  html += '<div class="addr-modal"><h3>选择收货地址</h3>';

  if (addresses.length > 0) {
    addresses.forEach(function(a) {
      var def = a.isDefault ? ' <span style="color:#22c55e;font-size:11px;font-weight:600">默认</span>' : '';
      html += '<label class="addr-option' + (a.isDefault ? ' selected' : '') + '" onclick="selectAddrOption(this,\'' + a.id + '\')">';
      html += '<input type="radio" name="addrRadio" value="' + a.id + '"' + (a.isDefault ? ' checked' : '') + '>';
      html += '<div class="addr-info"><div class="addr-name">' + escHtml(a.campus||'') + (a.building ? ' ' + escHtml(a.building) + '栋' : '') + (a.dormNumber ? ' ' + escHtml(a.dormNumber) : '') + def + '</div>';
      html += '<div class="addr-detail">' + escHtml(a.phone||'无电话') + '</div></div></label>';
      if (a.isDefault) selectedAddressId = a.id;
    });
    html += '<div class="addr-quick-form" style="width:100%;text-align:center;background:#fff;cursor:pointer;color:#6b7280;border:1px dashed #d1d5db" onclick="showQuickAddrForm()">+ 添加新地址</div>';
    html += '<div id="quickAddrFormWrap"></div>';
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddressModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="doBatchBuy(\'' + ids.join(',') + '\')">确认下单</button></div>';
  } else {
    html += '<p style="color:#6b7280;margin-bottom:12px">您还没有收货地址，请先添加：</p>';
    html += renderQuickAddrForm();
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddressModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="doBatchBuy(\'' + ids.join(',') + '\')">保存并下单</button></div>';
  }

  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
  if (!selectedAddressId && addresses.length > 0) {
    var def = addresses.find(function(a){return a.isDefault;});
    if (def) {
      selectedAddressId = def.id;
    } else {
      selectedAddressId = addresses[0].id;
      var firstOption = document.querySelector('.addr-option');
      if (firstOption) {
        firstOption.classList.add('selected');
        var radio = firstOption.querySelector('input[type=radio]');
        if (radio) radio.checked = true;
      }
    }
  }
}

function selectAddrOption(el, id) {
  selectedAddressId = id;
  document.querySelectorAll('.addr-option').forEach(function(o){o.classList.remove('selected');});
  el.classList.add('selected');
  el.querySelector('input[type=radio]').checked = true;
}

function closeAddressModal() {
  var overlay = document.getElementById('addrModalOverlay');
  if (overlay) overlay.remove();
}

function showQuickAddrForm() {
  document.getElementById('quickAddrFormWrap').innerHTML = renderQuickAddrForm();
}

function renderQuickAddrForm() {
  return '<div class="addr-quick-form">' +
    '<div class="form-row"><input type="text" id="addrPhone" placeholder="手机号"></div>' +
    '<div class="form-row"><select id="addrCampus">' + CAMPUSES.map(function(c){return '<option value="'+c.value+'">'+c.label+'</option>'}).join('') + '</select></div>' +
    '<div class="form-row"><input type="text" id="addrBuilding" placeholder="楼栋（如: 5号楼）"><input type="text" id="addrDorm" placeholder="宿舍号（如: 302）"></div>' +
    '</div>';
}

async function doBatchBuy(idsStr) {
  var ids = idsStr.split(',');
  // 如果有快速表单，先保存地址
  var phoneEl = document.getElementById('addrPhone');
  if (phoneEl && phoneEl.value.trim()) {
    var data = {
      phone: phoneEl.value.trim(),
      campus: document.getElementById('addrCampus') ? document.getElementById('addrCampus').value : '',
      building: document.getElementById('addrBuilding') ? document.getElementById('addrBuilding').value.trim() : '',
      dormNumber: document.getElementById('addrDorm') ? document.getElementById('addrDorm').value.trim() : ''
    };
    if (!data.phone) { showToast('请输入联系电话', 'error'); return; }
    var addrRes = await api.post('/addresses', data);
    if (addrRes.code === 200) {
      selectedAddressId = addrRes.data ? addrRes.data.id : '';
    } else {
      showToast(addrRes.message || '添加地址失败', 'error');
      return;
    }
  }

  if (!selectedAddressId) { showToast('请选择收货地址', 'error'); return; }

  closeAddressModal();

  // 逐项下单：记录成功与失败项，失败时收集具体原因
  var successIds = [];
  var failedItems = []; // { title, reason }
  var failedIds = [];
  for (var i = 0; i < ids.length; i++) {
    var item = cartItems.find(function(c){ return c.id === ids[i]; });
    if (!item) continue;
    // 前端预检：商品已售罄/下架的不发请求
    if (!isItemAvailable(item)) {
      var reason = item.productStatus === 'sold_out' ? '商品已售罄' : '商品已下架';
      failedItems.push({ title: item.productTitle, reason: reason });
      failedIds.push(item.id);
      continue;
    }
    try {
      var res = await api.post('/orders', { productId: item.productId, price: item.price, quantity: item.quantity, spec: item.specName, addressId: selectedAddressId });
      if (res.code === 200) {
        successIds.push(item.id);
      } else {
        failedItems.push({ title: item.productTitle, reason: res.message || '下单失败' });
        failedIds.push(item.id);
      }
    } catch (e) {
      failedItems.push({ title: item.productTitle, reason: '网络错误' });
      failedIds.push(item.id);
    }
  }

  // 关键修复：只删除成功下单的购物车项，失败的保留供用户查看
  if (successIds.length > 0) {
    try { await api.removeCartItems(successIds); } catch (e) {}
    successIds.forEach(function(id){ delete selectedIds[id]; });
  }

  // 构建结果提示
  var msg = '✅ 成功购买 ' + successIds.length + ' 件';
  if (failedItems.length > 0) {
    msg += '；❌ 失败 ' + failedItems.length + ' 件';
    // 把失败明细渲染为可读列表
    var detail = failedItems.map(function(f){ return '• ' + f.title + '：' + f.reason; }).join('\n');
    msg += '\n\n失败明细：\n' + detail;
    showToast(msg, 'error', 6000);
  } else {
    showToast(msg, 'success', 3000);
  }
  loadCart();
}

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
