<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物车 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.cart-item { display:flex; align-items:center; padding:16px; border-bottom:1px solid #f1f5f9; gap:12px }
.cart-item img { width:64px; height:64px; border-radius:8px; object-fit:cover; flex-shrink:0 }
.cart-item .info { flex:1; min-width:0 }
.cart-item .info .title { font-weight:600; font-size:14px; margin-bottom:4px }
.cart-item .info .spec { color:#6b7280; font-size:12px }
.cart-item .price { color:#ef4444; font-weight:700; font-size:15px; white-space:nowrap }
.summary { background:#f9fafb; border-radius:12px; padding:20px; margin-top:16px }
.summary .total { font-size:20px; font-weight:700; color:#ef4444 }
/* 地址选择弹窗 */
.addr-modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center }
.addr-modal { background:#fff; border-radius:12px; width:90%; max-width:460px; max-height:80vh; overflow-y:auto; padding:24px }
.addr-modal h3 { margin:0 0 16px 0; font-size:18px }
.addr-option { display:flex; align-items:center; padding:12px; border:1px solid #e5e7eb; border-radius:8px; cursor:pointer; margin-bottom:8px; transition:all .2s }
.addr-option:hover { border-color:#2563eb }
.addr-option.selected { border-color:#2563eb; background:#eff6ff }
.addr-option input[type=radio] { margin-right:12px }
.addr-option .addr-info { flex:1 }
.addr-option .addr-info .addr-name { font-weight:600; font-size:14px }
.addr-option .addr-info .addr-detail { font-size:12px; color:#6b7280; margin-top:2px }
.addr-quick-form { background:#f9fafb; border-radius:8px; padding:16px; margin-top:12px }
.addr-quick-form .form-row { display:flex; gap:8px; margin-bottom:8px }
.addr-quick-form .form-row input { flex:1; padding:8px; border:1px solid #d1d5db; border-radius:6px; font-size:13px }
.addr-modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end }
</style>
</head>
<body>
<div class="nav-sticky-wrap">
  <div class="top-nav"><div class="top-nav-inner"><span>欢迎来到校园二手交易平台！</span><div id="topNavRight"><a href="login.html">请登录</a><a href="register.html">免费注册</a></div></div></div>
  <header class="main-header subpage"><div class="header-inner"><div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer"><div class="logo-icon">📚</div><div><div class="logo-text">校园二手</div><div class="logo-sub">闲置交易平台</div></div></div><a href="../index.html" class="header-back"><span class="arrow">←</span> 返回首页</a></div></header>
</div>
<div class="publish-wrap" style="margin-top:16px">
  <div id="content" style="text-align:center;padding:80px"><p>⏳ 加载中...</p></div>
</div>

<script src="../js/api.js"></script>
<script>
(async function() {
  if (!await api.verifyAndInit()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  updateNav();
  loadCart();
})();

function updateNav() {
  var user = api.getUser();
  if (!user) return;
  document.getElementById('topNavRight').innerHTML =
    '<span>Hi, <b>' + escHtml(user.username) + '</b></span>' +
    '<a href="../index.html">首页</a>' +
    '<a href="orders.html">我的订单</a>' +
    '<a href="profile.html">个人中心</a>' +
    '<a href="javascript:void(0)" onclick="api.logout()">退出</a>';
}

var cartItems = [];
var selectedIds = {};

async function loadCart() {
  var res = await api.getCart();
  if (res.code !== 200) { document.getElementById('content').innerHTML = '<p>加载失败</p>'; return; }
  cartItems = res.data || [];
  if (cartItems.length === 0) {
    document.getElementById('content').innerHTML = '<div style="padding:80px;text-align:center"><p style="font-size:48px">🛒</p><p>购物车空空如也</p><a href="products.html" class="mall-btn mall-btn-primary" style="margin-top:16px">去逛逛</a></div>';
    return;
  }
  renderCart();
}

function renderCart() {
  var html = '';
  var totalPrice = 0;
  cartItems.forEach(function(item, i) {
    var checked = selectedIds[item.id] ? 'checked' : '';
    if (checked) totalPrice += item.price * item.quantity;
    html += '<div class="cart-item">' +
      '<input type="checkbox" '+checked+' onchange="toggleSelect(\''+item.id+'\')" style="width:18px;height:18px">' +
      '<img src="'+(item.productImage||'/resources/default-product.gif')+'" onerror="this.src=\'/resources/default-product.gif\'">' +
      '<div class="info"><div class="title">'+escHtml(item.productTitle)+'</div>'+(item.specName?'<div class="spec">规格: '+escHtml(item.specName)+'</div>':'')+'<div>数量: '+item.quantity+'</div></div>' +
      '<div class="price">¥'+(item.price * item.quantity).toFixed(2)+'</div>' +
      '<button class="btn btn-outline btn-sm" onclick="removeItem(\''+item.id+'\')">删除</button>' +
      '</div>';
  });

  var summary = '<div class="summary"><div style="display:flex;justify-content:space-between;align-items:center">' +
    '<div><span>已选: '+Object.keys(selectedIds).length+' 件</span><div class="total">合计: ¥'+totalPrice.toFixed(2)+'</div></div>' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn btn-outline" onclick="batchDelete()">批量删除选中</button>' +
    '<button class="btn btn-primary" onclick="batchBuy()">一键购买</button>' +
    '</div></div></div>';

  document.getElementById('content').innerHTML =
    '<div class="publish-card"><h2>购物清单</h2>'+html+'</div>'+summary;
}

function toggleSelect(id) {
  if (selectedIds[id]) { delete selectedIds[id]; } else { selectedIds[id] = true; }
  renderCart();
}

async function removeItem(id) {
  await api.removeCartItems(id);
  loadCart();
}

async function batchDelete() {
  var ids = Object.keys(selectedIds);
  if (ids.length === 0) { showToast('请先选择商品', 'warning'); return; }
  await api.removeCartItems(ids);
  selectedIds = {};
  loadCart();
}

var selectedAddressId = null;

async function batchBuy() {
  var ids = Object.keys(selectedIds);
  if (ids.length === 0) { showToast('请先选择商品', 'warning'); return; }
  // 加载地址列表并弹窗
  var addrRes = await api.get('/addresses');
  showAddressModal(addrRes.data || [], ids);
}

function showAddressModal(addresses, ids) {
  selectedAddressId = null;
  var html = '<div class="addr-modal-overlay" id="addrModalOverlay" onclick="if(event.target===this)closeAddressModal()">';
  html += '<div class="addr-modal"><h3>选择收货地址</h3>';

  if (addresses.length > 0) {
    addresses.forEach(function(a) {
      var def = a.isDefault ? ' <span style="color:#22c55e;font-size:11px;font-weight:600">默认</span>' : '';
      html += '<label class="addr-option' + (a.isDefault ? ' selected' : '') + '" onclick="selectAddrOption(this,\'' + a.id + '\')">';
      html += '<input type="radio" name="addrRadio" value="' + a.id + '"' + (a.isDefault ? ' checked' : '') + '>';
      html += '<div class="addr-info"><div class="addr-name">' + escHtml(a.campus||'') + (a.building ? ' ' + escHtml(a.building) + '栋' : '') + (a.dormNumber ? ' ' + escHtml(a.dormNumber) : '') + def + '</div>';
      html += '<div class="addr-detail">' + escHtml(a.phone||'无电话') + '</div></div></label>';
      if (a.isDefault) selectedAddressId = a.id;
    });
    html += '<div class="addr-quick-form" style="width:100%;text-align:center;background:#fff;cursor:pointer;color:#6b7280;border:1px dashed #d1d5db" onclick="showQuickAddrForm()">+ 添加新地址</div>';
    html += '<div id="quickAddrFormWrap"></div>';
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddressModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="doBatchBuy(\'' + ids.join(',') + '\')">确认下单</button></div>';
  } else {
    html += '<p style="color:#6b7280;margin-bottom:12px">您还没有收货地址，请先添加：</p>';
    html += renderQuickAddrForm();
    html += '<div class="addr-modal-actions"><button class="mall-btn" onclick="closeAddressModal()">取消</button>';
    html += '<button class="mall-btn mall-btn-primary" onclick="doBatchBuy(\'' + ids.join(',') + '\')">保存并下单</button></div>';
  }

  html += '</div></div>';
  document.body.insertAdjacentHTML('beforeend', html);
}

function selectAddrOption(el, id) {
  selectedAddressId = id;
  document.querySelectorAll('.addr-option').forEach(function(o){o.classList.remove('selected');});
  el.classList.add('selected');
  el.querySelector('input[type=radio]').checked = true;
}

function closeAddressModal() {
  var overlay = document.getElementById('addrModalOverlay');
  if (overlay) overlay.remove();
}

function showQuickAddrForm() {
  document.getElementById('quickAddrFormWrap').innerHTML = renderQuickAddrForm();
}

function renderQuickAddrForm() {
  return '<div class="addr-quick-form">' +
    '<div class="form-row"><input type="text" id="addrPhone" placeholder="手机号"></div>' +
    '<div class="form-row"><select id="addrCampus">' + CAMPUSES.map(function(c){return '<option value="'+c.value+'">'+c.label+'</option>'}).join('') + '</select></div>' +
    '<div class="form-row"><input type="text" id="addrBuilding" placeholder="楼栋（如: 5号楼）"><input type="text" id="addrDorm" placeholder="宿舍号（如: 302）"></div>' +
    '</div>';
}

async function doBatchBuy(idsStr) {
  var ids = idsStr.split(',');
  // 如果有快速表单，先保存地址
  var phoneEl = document.getElementById('addrPhone');
  if (phoneEl && phoneEl.value.trim()) {
    var data = {
      phone: phoneEl.value.trim(),
      campus: document.getElementById('addrCampus') ? document.getElementById('addrCampus').value : '',
      building: document.getElementById('addrBuilding') ? document.getElementById('addrBuilding').value.trim() : '',
      dormNumber: document.getElementById('addrDorm') ? document.getElementById('addrDorm').value.trim() : ''
    };
    if (!data.phone) { showToast('请输入联系电话', 'error'); return; }
    var addrRes = await api.post('/addresses', data);
    if (addrRes.code === 200) {
      selectedAddressId = addrRes.data ? addrRes.data.id : '';
    } else {
      showToast(addrRes.message || '添加地址失败', 'error');
      return;
    }
  }

  if (!selectedAddressId) { showToast('请选择收货地址', 'error'); return; }

  closeAddressModal();
  var success = 0;
  for (var i = 0; i < ids.length; i++) {
    var item = cartItems.find(function(c){ return c.id === ids[i]; });
    if (!item) continue;
    var res = await api.post('/orders', { productId: item.productId, price: item.price, quantity: item.quantity, spec: item.specName, addressId: selectedAddressId });
    if (res.code === 200) success++;
  }
  if (success > 0) {
    await api.removeCartItems(ids);
  }
  showToast('成功购买 ' + success + ' 件商品');
  loadCart();
}

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
