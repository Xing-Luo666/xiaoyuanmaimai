<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的订单 — 校园二手交易</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.orders-wrap { max-width:900px; margin:20px auto; padding:0 20px }
.orders-tabs { display:flex; gap:0; background:var(--white); border-radius:var(--radius); border:1px solid var(--border); margin-bottom:16px; overflow:hidden }
.orders-tab { flex:1; text-align:center; padding:12px; font-size:14px; cursor:pointer; transition:all .2s; border-bottom:2px solid transparent; font-weight:500 }
.orders-tab:hover { color:var(--primary); background:var(--primary-light) }
.orders-tab.active { color:var(--primary); border-bottom-color:var(--primary); background:var(--primary-light) }
.order-card { background:var(--white); border-radius:var(--radius); border:1px solid var(--border); padding:18px; margin-bottom:12px }
.order-card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border) }
.order-card-body { display:flex; gap:14px; align-items:center }
.order-card-footer { display:flex; justify-content:flex-end; gap:8px; margin-top:12px; padding-top:10px; border-top:1px solid var(--border) }
</style>
</head>
<body>

<div id="siteHeaderPlaceholder"></div>

<div class="orders-wrap">
  <div class="orders-tabs">
    <div class="orders-tab active" onclick="switchOrderTab('buyer',this)">我购买的</div>
    <div class="orders-tab" onclick="switchOrderTab('seller',this)">我卖出的</div>
  </div>
  <div id="ordersContent"></div>
</div>

<script src="../js/api.js"></script>
<script src="../js/header.js"></script>
<script>
var currentRole = 'buyer';

(async function() {
  if (!await api.verifyAndInit()) { location.href='login.html?redirect='+encodeURIComponent(location.href); return; }
  SiteHeader.render();
  loadOrders('buyer');
})();

function switchOrderTab(role, el) {
  currentRole = role;
  document.querySelectorAll('.orders-tab').forEach(function(t) { t.classList.remove('active'); });
  el.classList.add('active');
  loadOrders(role);
}

async function loadOrders(role) {
  var res = await api.get('/orders', { role: role });
  var ct = document.getElementById('ordersContent');
  if (res.code !== 200 || !res.data.list || !res.data.list.length) {
    var icon = role==='buyer'?'🛒':'💰';
    var text = '暂无'+(role==='buyer'?'购买':'卖出')+'记录';
    ct.innerHTML = '<div style="text-align:center;padding:80px 20px"><div style="font-size:64px;margin-bottom:12px;opacity:.7">'+icon+'</div><div style="font-size:15px;color:#6b7280;margin-bottom:16px">'+text+'</div>'+(role==='buyer'?'<a href="products.html" class="mall-btn mall-btn-primary">去逛逛</a>':'<a href="publish.html" class="mall-btn mall-btn-primary">去发布</a>')+'</div>';
    return;
  }
  ct.innerHTML = res.data.list.map(function(o) {
    var id = o.id;
    var statusMap = {pending:'待处理',accepted:'已接受',shipped:'已发货',completed:'已完成',rejected:'已拒绝',cancelled:'已取消'};
    var statusLabel = statusMap[o.status] || o.status;
    var bgColor = o.status==='completed'?'#DCFCE7':o.status==='pending'?'#FEF3C7':o.status==='shipped'||o.status==='accepted'?'#DBEAFE':o.status==='rejected'||o.status==='cancelled'?'#F1F5F9':'#F1F5F9';
    var textColor = o.status==='completed'?'#16A34A':o.status==='rejected'?'#EF4444':o.status==='cancelled'?'#6B7280':'#D97706';

    var footerHTML = '';
    var footerBtns = [];
    // 卖家: 接受/拒绝
    if (o.status === 'pending' && role === 'seller') {
      footerBtns.push('<button class="mall-btn mall-btn-primary mall-btn-sm" onclick="handleOrder(\''+o.id+'\',\'accepted\')">接受</button>');
      footerBtns.push('<button class="mall-btn mall-btn-danger mall-btn-sm" onclick="handleOrder(\''+o.id+'\',\'rejected\')">拒绝</button>');
    }
    // 卖家: 标记已发货
    if (o.status === 'accepted' && role === 'seller') {
      footerBtns.push('<button class="mall-btn mall-btn-primary mall-btn-sm" onclick="handleOrder(\''+o.id+'\',\'shipped\')">标记已发货</button>');
    }
    // 买家: 确认收货
    if (o.status === 'shipped' && role === 'buyer') {
      footerBtns.push('<button class="mall-btn mall-btn-primary mall-btn-sm" onclick="handleOrder(\''+o.id+'\',\'completed\')">确认收货</button>');
    }
    // 买家: 取消订单 (pending 或 accepted)
    if ((o.status === 'pending' || o.status === 'accepted') && role === 'buyer') {
      footerBtns.push('<button class="mall-btn mall-btn-danger mall-btn-sm" onclick="handleOrder(\''+o.id+'\',\'cancelled\')">取消订单</button>');
    }
    // 卖家: 取消售卖 (pending)
    if (o.status === 'pending' && role === 'seller') {
      footerBtns.push('<button class="mall-btn mall-btn-danger mall-btn-sm" onclick="handleOrder(\''+o.id+'\',\'cancelled\')">取消售卖</button>');
    }
    // 已完成: 评价入口
    if (o.status === 'completed') {
      footerHTML = '<div class="order-card-footer" id="reviewBtns_' + o.id + '"><span style="color:#9ca3af;font-size:12px" id="reviewStatus_' + o.id + '">加载中...</span></div>';
      checkReviewStatus(o.id);
    } else if (footerBtns.length > 0) {
      footerHTML = '<div class="order-card-footer">' + footerBtns.join('') + '</div>';
    }

    return '<div class="order-card">' +
      '<div class="order-card-header"><div><b>'+escHtml(o.productTitle)+'</b>'+(o.specName?'<span style="color:#6b7280;font-size:12px;margin-left:8px">规格: '+escHtml(o.specName)+'</span>':'')+(o.quantity>1?'<span style="color:#6b7280;font-size:12px;margin-left:8px">x'+o.quantity+'</span>':'')+'</div>' +
      '<span style="background:'+bgColor+';color:'+textColor+';padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600">'+statusLabel+'</span></div>' +
      '<div class="order-card-body"><div style="font-size:24px">'+(role==='buyer'?'🛒':'💰')+'</div><div style="flex:1"><div>'+(role==='buyer'?'卖家':'买家')+': <b>'+escHtml(role==='buyer'?o.sellerName:o.buyerName)+'</b></div>' +
      '<div style="color:#6b7280;font-size:13px">价格: <span style="color:#ef4444;font-weight:700">¥'+Number(o.price).toFixed(2)+'</span> · '+formatDate(o.createdAt)+'</div>' +
      (o.addressSnapshot ? renderAddrSnapshot(o.addressSnapshot) : '') +
      '</div></div>' +
      footerHTML + '</div>';
  }).join('');
}

function renderAddrSnapshot(snap) {
  try {
    var a = JSON.parse(snap);
    return '<div style="font-size:11px;color:#9ca3af;margin-top:4px">📍 ' + escHtml(a.campus||'') +
      (a.building ? ' ' + escHtml(a.building) + '栋' : '') +
      (a.dormNumber ? ' ' + escHtml(a.dormNumber) : '') +
      ' · ' + escHtml(a.phone||'') + '</div>';
  } catch(e) { return ''; }
}

async function handleOrder(orderId, status) {
  var res = await api.put('/orders/' + orderId + '/status', { status: status });
  if (res.code === 200) { showToast('操作成功！'); loadOrders(currentRole); }
  else { showToast(res.message || '操作失败', 'error'); }
}

async function checkReviewStatus(orderId) {
  var el = document.getElementById('reviewStatus_' + orderId);
  if (!el) return;
  var res = await api.get('/orders/' + orderId + '/reviewed');
  if (res.code === 200 && res.data && res.data.reviewed) {
    el.innerHTML = '已评价';
  } else {
    el.innerHTML = '<button class="mall-btn mall-btn-sm" onclick="showReviewForm(\'' + orderId + '\')">★ 写评价</button>';
  }
}

function showReviewForm(orderId) {
  var container = document.getElementById('reviewBtns_' + orderId);
  if (!container) return;
  container.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">' +
    '<span style="font-size:12px;color:#6b7280">评分</span>' +
    '<select id="rating_' + orderId + '" style="padding:4px 8px;border-radius:6px;border:1px solid #d1d5db">' +
    '<option value="5">★★★★★ 非常好</option><option value="4">★★★★☆ 好</option><option value="3">★★★☆☆ 一般</option><option value="2">★★☆☆☆ 差</option><option value="1">★☆☆☆☆ 很差</option>' +
    '</select>' +
    '<input type="text" id="content_' + orderId + '" placeholder="说点什么吧..." style="flex:1;min-width:120px;padding:4px 8px;border-radius:6px;border:1px solid #d1d5db">' +
    '<button class="mall-btn mall-btn-primary mall-btn-sm" onclick="submitReview(\'' + orderId + '\')">提交评价</button>' +
    '<button class="mall-btn mall-btn-sm" onclick="checkReviewStatus(\'' + orderId + '\')">取消</button>' +
    '</div>';
}

async function submitReview(orderId) {
  var rating = parseInt(document.getElementById('rating_' + orderId).value);
  var content = document.getElementById('content_' + orderId).value.trim();
  var res = await api.post('/orders/' + orderId + '/review', { rating: rating, content: content });
  if (res.code === 200) { showToast('评价成功！'); checkReviewStatus(orderId); }
  else { showToast(res.message || '评价失败', 'error'); }
}

function escHtml(s) { return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''; }
</script>
</body>
</html>
