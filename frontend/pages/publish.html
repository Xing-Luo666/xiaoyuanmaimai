<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布商品 - 校园二手交易平台</title>
<link rel="stylesheet" href="../css/mall.css">
<style>
.publish-wrap { max-width:660px; margin:20px auto; padding:0 20px }
.publish-card { background:var(--white); border-radius:var(--radius-lg); border:1px solid var(--border); padding:30px; box-shadow:var(--shadow) }
.publish-card h2 { font-size:20px; margin-bottom:24px }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:16px }
@media (max-width:600px) { .form-row { grid-template-columns:1fr } .publish-card { padding:18px } }
.upload-area { border:2px dashed #d1d5db; border-radius:12px; padding:32px; text-align:center; background:#fafbfc; cursor:pointer; transition:all .2s; margin-bottom:16px }
.upload-area:hover, .upload-area.drag-over { border-color:#2563eb; background:#eff6ff }
.upload-area .upload-icon { font-size:40px; margin-bottom:8px }
.upload-area p { color:#6b7280; font-size:13px; margin:4px 0 }
.upload-area .upload-hint { color:#9ca3af; font-size:11px }
.preview-list { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px }
.preview-item { position:relative; width:100px; height:100px; border-radius:8px; overflow:hidden; border:1px solid #e5e7eb; flex-shrink:0 }
.preview-item img { width:100%; height:100%; object-fit:cover }
.preview-item .remove-btn { position:absolute; top:2px; right:2px; width:22px; height:22px; background:rgba(0,0,0,.6); color:#fff; border:none; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1 }
.preview-item .remove-btn:hover { background:#ef4444 }
.upload-progress { display:none; margin-bottom:12px; height:4px; background:#e5e7eb; border-radius:2px; overflow:hidden }
.upload-progress .bar { height:100%; background:#2563eb; transition:width .3s }
</style>
</head>
<body>

<div class="nav-sticky-wrap">
  <div class="top-nav"><div class="top-nav-inner"><span>欢迎来到校园二手交易平台！</span><div id="topNavRight"><a href="login.html">请登录</a><a href="register.html">免费注册</a></div></div></div>
  <header class="main-header subpage"><div class="header-inner"><div class="logo-area" onclick="location.href='../index.html'" style="cursor:pointer"><div class="logo-icon">📚</div><div><div class="logo-text">校园二手</div><div class="logo-sub">闲置交易平台</div></div></div><a href="../index.html" class="header-back"><span class="arrow">←</span> 返回首页</a></div></header>
</div>

<div class="publish-wrap" style="margin-top:16px">
  <div class="publish-card">
    <h2>📦 发布商品</h2>
    <form id="publishForm">
      <div class="form-group"><label class="form-label">商品标题 *</label><input type="text" class="form-input" id="title" placeholder="例：九成新 iPhone 14 128G" required></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">分类 *</label><select class="form-select" id="category" required></select></div>
        <div class="form-group"><label class="form-label">成色</label><select class="form-select" id="condition"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">校区 *</label><select class="form-select" id="campus" required></select></div>
        <div class="form-group"><label class="form-label">楼栋</label><select class="form-select" id="building"></select></div>
      </div>
      <div class="form-group">
        <label class="form-label">商品规格 * <span style="color:#ef4444;font-weight:400">（至少添加一个规格）</span></label>
        <div id="specsContainer" style="min-height:60px;border:2px dashed #e5e7eb;border-radius:8px;padding:12px;background:#fafbfc">
          <div style="text-align:center;color:#9ca3af;font-size:13px;padding:20px" id="specsEmpty">还没有添加规格，请点击下方按钮添加</div>
        </div>
        <button type="button" class="btn btn-outline btn-sm" onclick="addSpec()" style="margin-top:6px">+ 添加规格</button>
      </div>
      <div class="form-group"><label class="form-label">商品描述</label><textarea class="form-input" id="description" placeholder="详细描述商品状况、购买时间、使用频率等..." rows="5"></textarea></div>
      <div class="form-group">
        <label class="form-label">商品图片 <span style="color:#9ca3af;font-weight:400">（拖拽或点击上传，支持 jpg/png/gif/webp/heic，≤10MB）</span></label>
        <div class="preview-list" id="previewList"></div>
        <div class="upload-progress" id="uploadProgress"><div class="bar" style="width:0%"></div></div>
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📷</div>
          <p>点击或拖拽图片到此处上传</p>
          <p class="upload-hint">支持 .jpg .jpeg .png .gif .webp .bmp .heic，单张不超过 10MB</p>
          <p class="upload-hint" style="margin-top:8px">如不添加图片，将使用默认商品图</p>
        </div>
        <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
      </div>
      <button type="submit" class="mall-btn mall-btn-primary mall-btn-block mall-btn-lg" id="submitBtn"><span id="btnText">发布商品</span></button>
    </form>
  </div>
</div>

<script src="../js/api.js"></script>
<script>
(function() {
  api.verifyAndInit().then(function(ok) {
    if (!ok) { location.href = 'login.html?redirect=' + encodeURIComponent(location.href); return; }
    var user = api.getUser();
    if (user) {
      document.getElementById('topNavRight').innerHTML =
        '<span>Hi, <b>' + escHtml(user.username) + '</b></span>' +
        '<a href="../index.html">首页</a>' +
        '<a href="orders.html">我的订单</a>' +
        '<a href="profile.html">个人中心</a>' +
        '<a href="javascript:void(0)" onclick="api.logout()">退出</a>';
    }
  });

  CATEGORIES.forEach(function(c) { var opt = document.createElement('option'); opt.value = c.value; opt.textContent = c.label; document.getElementById('category').appendChild(opt); });
  CONDITIONS.forEach(function(c) { var opt = document.createElement('option'); opt.value = c.value; opt.textContent = c.label; document.getElementById('condition').appendChild(opt); });
  CAMPUSES.forEach(function(c) { var opt = document.createElement('option'); opt.value = c.value; opt.textContent = c.label; document.getElementById('campus').appendChild(opt); });
  BUILDINGS.forEach(function(b) { var opt = document.createElement('option'); opt.value = b.value; opt.textContent = b.label; document.getElementById('building').appendChild(opt); });

  var specIdCounter = 0;
  window.addSpec = function() {
    specIdCounter++;
    var container = document.getElementById('specsContainer');
    document.getElementById('specsEmpty').style.display = 'none';
    var div = document.createElement('div');
    div.className = 'spec-row';
    div.id = 'spec-' + specIdCounter;
    div.style.cssText = 'display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;background:#fff;padding:10px;border-radius:8px;border:1px solid #e5e7eb';
    div.innerHTML = 
      '<input type="text" class="form-input" placeholder="规格名（如：红色128G）" style="flex:1;min-width:100px" required>' +
      '<span style="font-size:12px;color:#6b7280;white-space:nowrap">原价</span>' +
      '<input type="number" class="form-input" placeholder="原价" step="0.01" min="0" style="width:90px" required>' +
      '<span style="font-size:12px;color:#6b7280;white-space:nowrap">现价</span>' +
      '<input type="number" class="form-input" placeholder="现价" step="0.01" min="0" style="width:90px" required>' +
      '<span style="font-size:12px;color:#6b7280;white-space:nowrap">库存</span>' +
      '<input type="number" class="form-input spec-stock" placeholder="库存" min="1" value="1" style="width:70px">' +
      '<label style="font-size:11px;white-space:nowrap;display:flex;align-items:center;gap:2px;cursor:pointer"><input type="checkbox" class="spec-infinite" onchange="toggleInfinite(this)" style="accent-color:#2563eb">无限</label>' +
      '<button type="button" class="btn btn-outline btn-sm" onclick="removeSpec(this)" style="color:#ef4444;border-color:#ef4444">×</button>';
    container.appendChild(div);
  };

  window.removeSpec = function(btn) {
    var row = btn.parentElement;
    row.remove();
    if (document.getElementById('specsContainer').querySelectorAll('.spec-row').length === 0) {
      document.getElementById('specsEmpty').style.display = '';
    }
  };

  window.toggleInfinite = function(cb) {
    var stockInput = cb.parentElement.parentElement.querySelector('.spec-stock');
    if (cb.checked) {
      stockInput.value = '-1';
      stockInput.disabled = true;
      stockInput.style.background = '#f3f4f6';
    } else {
      stockInput.value = '1';
      stockInput.disabled = false;
      stockInput.style.background = '';
    }
  };

  function getSpecs() {
    var specs = [];
    document.querySelectorAll('#specsContainer .spec-row').forEach(function(row) {
      var inputs = row.querySelectorAll('input:not([type="checkbox"])');
      var name = inputs[0].value.trim();
      var oriPrice = parseFloat(inputs[1].value) || 0;
      var price = parseFloat(inputs[2].value) || 0;
      var stock = parseInt(inputs[3].value) || 0;
      var infinite = row.querySelector('.spec-infinite');
      if (infinite && infinite.checked) stock = -1;
      if (name) {
        specs.push({ id: 's' + (specs.length+1), name: name, oriPrice: oriPrice, price: price, stock: stock });
      }
    });
    return specs;
  }

  var uploadedImages = [];
  var uploading = false;

  var uploadArea = document.getElementById('uploadArea');
  var fileInput = document.getElementById('fileInput');
  var progressBar = document.getElementById('uploadProgress');

  uploadArea.addEventListener('click', function() { fileInput.click(); });

  uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.classList.add('drag-over'); });
  uploadArea.addEventListener('dragleave', function() { uploadArea.classList.remove('drag-over'); });
  uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

  fileInput.addEventListener('change', function() { handleFiles(this.files); this.value = ''; });

  function handleFiles(files) {
    var validExts = ['jpg','jpeg','png','gif','webp','bmp','heic','heif'];
    var validFiles = [];
    for (var i = 0; i < files.length; i++) {
      var f = files[i];
      if (f.size > 10 * 1024 * 1024) { showToast(f.name + ' 超过10MB限制', 'error'); continue; }
      var ext = f.name.split('.').pop().toLowerCase();
      if (validExts.indexOf(ext) === -1) { showToast(f.name + ' 格式不支持', 'error'); continue; }
      validFiles.push(f);
    }
    // 逐个上传（串行，避免并发问题）
    uploadNext(validFiles, 0);
  }

  function uploadNext(files, idx) {
    if (idx >= files.length) return;
    uploadFile(files[idx], function() { uploadNext(files, idx + 1); });
  }

  async function uploadFile(file, callback) {
    uploading = true;
    progressBar.style.display = 'block';
    progressBar.querySelector('.bar').style.width = '30%';

    var formData = new FormData();
    formData.append('image', file);

    try {
      var token = api.token;
      var res = await fetch(API_BASE + '/upload', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token },
        body: formData
      });
      var json = await res.json();
      progressBar.querySelector('.bar').style.width = '100%';
      setTimeout(function() { progressBar.style.display = 'none'; progressBar.querySelector('.bar').style.width = '0%'; }, 500);

      if (json.code === 200) {
        uploadedImages.push(json.data.url);
        renderPreviews();
        showToast('图片上传成功');
      } else {
        showToast(json.message || '上传失败', 'error');
      }
    } catch(e) {
      progressBar.style.display = 'none';
      progressBar.querySelector('.bar').style.width = '0%';
      showToast('网络错误，上传失败', 'error');
    }
    uploading = false;
    if (callback) callback();
  }

  function renderPreviews() {
    var container = document.getElementById('previewList');
    container.innerHTML = uploadedImages.map(function(url, i) {
      return '<div class="preview-item"><img src="' + url + '" alt="preview"><button class="remove-btn" onclick="removeImage(' + i + ')" type="button">&times;</button></div>';
    }).join('');
  }

  window.removeImage = function(i) {
    uploadedImages.splice(i, 1);
    renderPreviews();
  };

  document.getElementById('publishForm').addEventListener('submit', function(e) {
    e.preventDefault();

    var specs = getSpecs();
    if (specs.length === 0) {
      alert('请至少添加一个商品规格');
      return;
    }

    // 使用第一个规格的现价作为商品默认价格
    var defaultPrice = specs[0].price;
    var defaultOriPrice = specs[0].oriPrice;

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    document.getElementById('btnText').textContent = '提交中...';
    var data = {
      title: document.getElementById('title').value.trim(),
      description: document.getElementById('description').value.trim(),
      category: document.getElementById('category').value,
      price: defaultPrice,
      oriPrice: defaultOriPrice,
      images: uploadedImages,
      specs: specs,
      condition: document.getElementById('condition').value,
      campus: document.getElementById('campus').value,
      building: document.getElementById('building').value
    };
    api.post('/products', data).then(function(res) {
      btn.disabled = false;
      document.getElementById('btnText').textContent = '发布商品';
      if (res.code === 200) {
        alert('发布成功！');
        location.href = 'product-detail.html?id=' + res.data.id;
      } else {
        alert(res.message || '发布失败');
      }
    });
  });
})();

function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
</body>
</html>
